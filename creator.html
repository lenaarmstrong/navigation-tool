<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Navigation Technology Co-Design Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css">
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>

    <nav class="top-nav" aria-label="Page navigation">
        <a href="viewer.html" id="nav-viewer-link">Viewer</a>
        <a href="creator.html" class="active" id="nav-creator-link">Creator</a>
    </nav>

<div class="app-wrapper">
    <div class="top-bar">
        <h1 id="header-text">Tell Your Navigation Stories on the Map</h1>
        <button class="lang-btn" id="lang-btn" aria-label="Switch language">EN</button>
    </div>
    
<div class="layout">
    <div class="panel">
        <div id="creator-tabs" style="display: flex; gap: 8px; margin-bottom: 10px;">
            <button type="button" id="tab-route-annotations" class="circle-secondary-btn" style="margin-bottom: 0; background: #6A5ACD; color: #fff; border-color: #6A5ACD;">Routes</button>
            <button type="button" id="tab-bubbles" class="circle-secondary-btn" style="margin-bottom: 0;">Regions</button>
        </div>
        <div id="panel-route-annotations">
        <h4 id="visualize-route-heading" style="margin-top: 4px; border-top: 1px solid #eee; padding-top: 12px;">Visualize A Route</h4>
        <div class="profile-buttons">
            <button type="button" class="profile-btn active" data-profile="driving">Driving</button>
            <button type="button" class="profile-btn" data-profile="walking">Walking</button>
            <button type="button" class="profile-btn" data-profile="cycling">Cycling</button>
        </div>
        <div class="address-wrap">
            <input type="text" id="start" placeholder="Starting Address" autocomplete="off">
            <div class="search-results" id="start-results"></div>
        </div>
        <div class="address-wrap">
            <input type="text" id="end" placeholder="Destination Address" autocomplete="off">
            <div class="search-results" id="end-results"></div>
        </div>
        <button id="calc-route">Visualize Route</button>

        <div class="annotations-section">
            <h4 id="annotations-heading">Add Annotations</h4>
            
            <div class="annotation-row">
                <button type="button" class="color-swatch selected" data-color-index="0" style="background: #43159e;" aria-label="Color 1"></button>
                <!-- <input type="text" class="label-input" id="label-0" placeholder="e.g. Residents"> -->
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="1" style="background: #F7B32B;" aria-label="Color 2"></button>
                <!-- <input type="text" class="label-input" id="label-1" placeholder="e.g. Taxi drivers"> -->
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="2" style="background: #335145;" aria-label="Color 3"></button>
                <!-- <input type="text" class="label-input" id="label-2" placeholder="e.g. Delivery workers"> -->
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="3" style="background: #8CBA80;" aria-label="Color 4"></button>
                <!-- <input type="text" class="label-input" id="label-3" placeholder="e.g. Tourists"> -->
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="4" style="background: #3066BE;" aria-label="Color 5"></button>
                <!-- <input type="text" class="label-input" id="label-4" placeholder="e.g. Bus drivers"> -->
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="5" style="background: #88CCF1;" aria-label="Color 6"></button>
                <!-- <input type="text" class="label-input" id="label-5" placeholder="e.g. Pedestrians"> -->
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="6" style="background: #a64b00;" aria-label="Color 7"></button>
                <!-- <input type="text" class="label-input" id="label-6" placeholder="e.g. New category"> -->
            </div>

            <div class="draw-tools-panel" aria-label="Drawing tools">
                <button type="button" class="draw-tool-btn active" data-draw-mode="draw_line_string" aria-label="Draw line">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18L10 12L14 14L20 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <button type="button" class="draw-tool-btn" data-draw-mode="draw_polygon" aria-label="Draw polygon">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6L15 4L20 12L14 20L6 16Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path></svg>
                </button>
                <button type="button" class="draw-tool-btn" data-draw-mode="draw_point" aria-label="Draw point">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"></circle></svg>
                </button>
            </div>
        </div>
        <!-- <p id="hint-text" style="font-size: 12px; color: #666;">Use the top-right toolbar to draw annotations.</p> -->
        <div style="display: flex; gap: 8px; align-items: stretch; margin-bottom: 16px;">
            <input type="text" id="map-text-input" placeholder="Text to place on map" style="flex: 1; margin-bottom: 0;">
            <button type="button" id="text-mode-btn" class="circle-secondary-btn" style="width: auto; margin-bottom: 0; flex-shrink: 0;">Add Text</button>
        </div>

        <div style="border-top: 1px solid #eee; padding-top: 12px;">
            <div style="display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch;">
                <button type="button" id="undo-annotation-btn" class="circle-secondary-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Undo</button>
                <button type="button" id="redo-annotation-btn" class="circle-secondary-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Redo</button>
                <button type="button" id="save-shapes-png" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Save</button>
            </div>
        </div>
        </div>
        <div id="panel-bubbles" style="display: none;">
        <div class="circle-tool-section">
            <h4 id="circle-tool-heading">Draw Bubbles of Safety</h4>
            <label class="circle-label" for="circle-radius" id="circle-radius-label">Radius (meters)</label>
            <div class="circle-radius-row">
                <input type="range" id="circle-radius" min="50" max="3000" step="50" value="250">
                <span id="circle-radius-value">250 m</span>
            </div>
            <label class="circle-label" id="circle-color-label">Color</label>
            <div class="circle-color-row">
                <div class="annotation-row" style="margin-right: 0; margin-bottom: 0;">
                    <button type="button" class="color-swatch circle-region-swatch" data-circle-preset="#3066BE" style="background: #3066BE;" aria-label="Circle color #3066BE"></button>
                    <button type="button" class="color-swatch circle-region-swatch" data-circle-preset="#88CCF1" style="background: #88CCF1;" aria-label="Circle color #88CCF1"></button>
                </div>
            </div>
            <button type="button" id="circle-mode-btn" class="circle-mode-btn">Place circle on map</button>
            <button type="button" id="clear-circles-btn" class="circle-secondary-btn circle-clear-btn">Clear all circles</button>
            <!-- <p id="circle-hint" class="circle-hint">Turn on placement, then click the map to add a circle.</p> -->
            <div style="border-top: 1px solid #eee; padding-top: 12px;">
                <div style="display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch;">
                    <button type="button" id="undo-regions-btn" class="circle-secondary-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Undo</button>
                    <button type="button" id="redo-regions-btn" class="circle-secondary-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Redo</button>
                    <button type="button" id="save-regions-png-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Save</button>
                </div>
            </div>
        </div>
        </div>

    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>
</div>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoibGVuYWFybXMiLCJhIjoiY205N3V0aGw2MGJnMDJsb2tiNDB1czFzaiJ9.bTzeSaHAUueU3tJHFNXyAA';

    function setCreatorTab(tabName) {
        var routePanel = document.getElementById('panel-route-annotations');
        var bubblesPanel = document.getElementById('panel-bubbles');
        var routeBtn = document.getElementById('tab-route-annotations');
        var bubblesBtn = document.getElementById('tab-bubbles');
        if (!routePanel || !bubblesPanel || !routeBtn || !bubblesBtn) return;
        var routeActive = tabName !== 'bubbles';
        routePanel.style.display = routeActive ? '' : 'none';
        bubblesPanel.style.display = routeActive ? 'none' : '';
        routeBtn.style.background = routeActive ? '#6A5ACD' : '#fff';
        routeBtn.style.color = routeActive ? '#fff' : '#444';
        routeBtn.style.borderColor = routeActive ? '#6A5ACD' : '#ccc';
        bubblesBtn.style.background = routeActive ? '#fff' : '#6A5ACD';
        bubblesBtn.style.color = routeActive ? '#444' : '#fff';
        bubblesBtn.style.borderColor = routeActive ? '#ccc' : '#6A5ACD';
    }

    document.getElementById('tab-route-annotations').addEventListener('click', function () {
        setCreatorTab('route');
    });
    document.getElementById('tab-bubbles').addEventListener('click', function () {
        setCreatorTab('bubbles');
    });

    const translations = {
        en: {
            header: 'Tell Your Navigation Stories on the Map',
            startPlaceholder: 'Starting Address',
            endPlaceholder: 'Destination Address',
            driving: 'Driving',
            walking: 'Walking',
            cycling: 'Cycling',
            visualizeRouteHeading: 'Visualize A Route',
            visualizeRoute: 'Visualize Route',
            routesTab: 'Routes',
            regionsTab: 'Regions',
            hint: 'Use the top-right toolbar to draw annotations.',
            errStart: 'Could not find the starting address. Please check it and try again.',
            errEnd: 'Could not find the destination address. Please check it and try again.',
            errNoRoute: 'No route found between these two addresses. Try a different travel mode or addresses.',
            annotationsHeading: 'Add Annotations',
            routeHint: 'Search, select a result in each box (click or Enter), then click Visualize Route.',
            labelPlaceholder0: 'e.g. Residents',
            labelPlaceholder1: 'e.g. Taxi drivers',
            labelPlaceholder2: 'e.g. Delivery workers',
            labelPlaceholder3: 'e.g. Tourists',
            labelPlaceholder4: 'e.g. Bus drivers',
            labelPlaceholder5: 'e.g. Pedestrians',
            circleToolHeading: 'Draw Bubbles of Safety',
            circleRadiusLabel: 'Radius (meters)',
            circleColorLabel: 'Color',
            placeCircle: 'Place circle on map',
            cancelPlace: 'Cancel placement',
            clearCircles: 'Clear all circles',
            useAnnotationColor: 'Use annotation color',
            addText: 'Add Text',
            mapTextPlaceholder: 'Text to place on map',
            saveShapesPng: 'Save',
            navCreator: 'Creator',
            navViewer: 'Viewer',
            undo: 'Undo',
            redo: 'Redo',
            circleHint: 'Turn on placement, then click the map to add a circle.',
            circleHintActive: 'Click the map to place a circle. Turn off when done.'
        },
        pt: {
            header: 'Compartilhe suas histórias de navegação no mapa',
            startPlaceholder: 'Endereço de partida',
            endPlaceholder: 'Endereço de destino',
            driving: 'Dirigir',
            walking: 'Caminhar',
            cycling: 'Andar de bicicleta',
            visualizeRouteHeading: 'Visualize uma rota',
            visualizeRoute: 'Visualizar Rota',
            routesTab: 'Rotas',
            regionsTab: 'Regiões',
            hint: 'Use a barra de ferramentas no canto superior direito para desenhar anotações.',
            errStart: 'Não foi possível encontrar o endereço de partida. Verifique e tente novamente.',
            errEnd: 'Não foi possível encontrar o endereço de destino. Verifique e tente novamente.',
            errNoRoute: 'Nenhuma rota encontrada entre esses endereços. Tente outro modo de viagem ou endereços.',
            annotationsHeading: 'Adicionar anotações',
            routeHint: 'Pesquise, selecione um resultado em cada caixa (clique ou Enter), depois clique em Visualizar Rota.',
            labelPlaceholder0: 'ex: Residentes',
            labelPlaceholder1: 'ex: Motoristas de táxi',
            labelPlaceholder2: 'ex: Entregadores',
            labelPlaceholder3: 'ex: Turistas',
            labelPlaceholder4: 'ex: Motoristas de ônibus',
            labelPlaceholder5: 'ex: Pedestres',
            circleToolHeading: 'Círculos no mapa',
            circleRadiusLabel: 'Raio (metros)',
            circleColorLabel: 'Cor',
            placeCircle: 'Colocar círculo no mapa',
            cancelPlace: 'Cancelar colocação',
            clearCircles: 'Limpar todos os círculos',
            useAnnotationColor: 'Usar cor da anotação',
            addText: 'Adicionar Texto',
            mapTextPlaceholder: 'Texto para colocar no mapa',
            saveShapesPng: 'Salvar',
            navCreator: 'Criador',
            navViewer: 'Visualizador',
            undo: 'Desfazer',
            redo: 'Refazer',
            circleHint: 'Ative a colocação e clique no mapa para adicionar um círculo.',
            circleHintActive: 'Clique no mapa para colocar um círculo. Desative ao terminar.'
        }
    };

    let currentLang = localStorage.getItem('coDesignLang') === 'pt' ? 'pt' : 'en';

    function applyLanguage(lang) {
        const t = translations[lang];
        document.getElementById('header-text').textContent = t.header;
        var startInput = document.getElementById('start');
        var endInput = document.getElementById('end');
        if (startInput) startInput.placeholder = t.startPlaceholder;
        if (endInput) endInput.placeholder = t.endPlaceholder;
        document.querySelector('.profile-btn[data-profile="driving"]').textContent = t.driving;
        document.querySelector('.profile-btn[data-profile="walking"]').textContent = t.walking;
        document.querySelector('.profile-btn[data-profile="cycling"]').textContent = t.cycling;
        document.getElementById('tab-route-annotations').textContent = t.routesTab;
        document.getElementById('tab-bubbles').textContent = t.regionsTab;
        document.getElementById('visualize-route-heading').textContent = t.visualizeRouteHeading;
        document.getElementById('calc-route').textContent = t.visualizeRoute;
        const hintText = document.getElementById('hint-text');
        if (hintText) hintText.textContent = t.hint;
        document.getElementById('annotations-heading').textContent = t.annotationsHeading;
        [0, 1, 2, 3, 4, 5].forEach(i => {
            const input = document.getElementById('label-' + i);
            if (input) input.placeholder = t['labelPlaceholder' + i];
        });
        document.getElementById('circle-tool-heading').textContent = t.circleToolHeading;
        document.getElementById('circle-radius-label').textContent = t.circleRadiusLabel;
        document.getElementById('circle-color-label').textContent = t.circleColorLabel;
        document.getElementById('clear-circles-btn').textContent = t.clearCircles;
        document.getElementById('nav-creator-link').textContent = t.navCreator;
        document.getElementById('nav-viewer-link').textContent = t.navViewer;
        document.getElementById('undo-annotation-btn').textContent = t.undo;
        document.getElementById('redo-annotation-btn').textContent = t.redo;
        document.getElementById('undo-regions-btn').textContent = t.undo;
        document.getElementById('redo-regions-btn').textContent = t.redo;
        document.getElementById('text-mode-btn').textContent = t.addText;
        const mapTextInput = document.getElementById('map-text-input');
        if (mapTextInput) mapTextInput.placeholder = t.mapTextPlaceholder;
        document.getElementById('save-shapes-png').textContent = t.saveShapesPng;
        document.getElementById('save-regions-png-btn').textContent = t.saveShapesPng;
        const modeBtn = document.getElementById('circle-mode-btn');
        if (modeBtn) modeBtn.textContent = circleModeActive ? t.cancelPlace : t.placeCircle;
        updateCircleHintText();
    }

    let circleModeActive = false;
    let circleSwatchColor = '#3066BE';
    const userCirclesData = { type: 'FeatureCollection', features: [] };

    function updateCircleHintText() {
        const hint = document.getElementById('circle-hint');
        if (!hint) return;
        const t = translations[currentLang];
        hint.textContent = circleModeActive ? t.circleHintActive : t.circleHint;
    }

    document.getElementById('lang-btn').onclick = () => {
        currentLang = currentLang === 'en' ? 'pt' : 'en';
        localStorage.setItem('coDesignLang', currentLang);
        applyLanguage(currentLang);
        document.getElementById('lang-btn').textContent = currentLang === 'en' ? 'EN' : 'PT';
    };

    applyLanguage(currentLang);
    document.getElementById('lang-btn').textContent = currentLang === 'en' ? 'EN' : 'PT';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11',
        center: [-43.23, -22.93], // Rio de Janeiro, Brazil
        zoom: 11
    });

    const ANNOTATION_COLORS = ['#43159e', '#335145', '#F7B32B', '#3066BE', '#8CBA80', '#88CCF1', '#a64b00'];
    let selectedColorIndex = 0;

    const draw = new MapboxDraw({
        displayControlsDefault: false,
        controls: { trash: true },
        userProperties: true
    });
    map.addControl(draw, 'top-right');

    let routeStartMarker = null;
    let routeEndMarker = null;
    let textModeActive = false;
    const mapTextData = { type: 'FeatureCollection', features: [] };
    let nextMapTextId = 1;
    let draggingTextId = null;
    let suppressNextTextClick = false;
    const annotationHistoryPast = [];
    const annotationHistoryFuture = [];
    let applyingAnnotationHistory = false;

    function removeRouteMarkers() {
        if (routeStartMarker) {
            routeStartMarker.remove();
            routeStartMarker = null;
        }
        if (routeEndMarker) {
            routeEndMarker.remove();
            routeEndMarker = null;
        }
    }

    map.on('load', () => {
        map.addSource('annotations', {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: [] }
        });
        map.addLayer({
            id: 'annotations-fill',
            type: 'fill',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'Polygon'],
            paint: {
                'fill-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], 6, ANNOTATION_COLORS[6], '#95a5a6'],
                'fill-opacity': 0.6
            }
        });
        map.addLayer({
            id: 'annotations-line',
            type: 'line',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'Polygon'],
            paint: {
                'line-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], 6, ANNOTATION_COLORS[6], '#95a5a6'],
                'line-width': 2
            }
        });
        map.addLayer({
            id: 'annotations-linestring',
            type: 'line',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'LineString'],
            paint: {
                'line-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], 6, ANNOTATION_COLORS[6], '#95a5a6'],
                'line-width': 4
            }
        });
        map.addLayer({
            id: 'annotations-point',
            type: 'circle',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'Point'],
            paint: {
                'circle-radius': 8,
                'circle-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], 6, ANNOTATION_COLORS[6], '#95a5a6'],
                'circle-stroke-width': 2,
                'circle-stroke-color': '#fff'
            }
        });
        map.addSource('user-circles', {
            type: 'geojson',
            data: userCirclesData
        });
        map.addLayer({
            id: 'user-circles-fill',
            type: 'fill',
            source: 'user-circles',
            paint: {
                'fill-color': ['coalesce', ['get', 'color'], '#6A5ACD'],
                'fill-opacity': 0.2
            }
        });
        map.addLayer({
            id: 'user-circles-line',
            type: 'line',
            source: 'user-circles',
            paint: {
                'line-color': ['coalesce', ['get', 'color'], '#6A5ACD'],
                'line-width': 1
            }
        });
        map.addSource('map-text', {
            type: 'geojson',
            data: mapTextData
        });
        map.addLayer({
            id: 'map-text-layer',
            type: 'symbol',
            source: 'map-text',
            layout: {
                'text-field': ['get', 'text'],
                'text-size': 15,
                'text-font': ['Lato Regular', 'Arial Unicode MS Regular'],
                'text-offset': [0, 0],
                'text-anchor': 'center',
                'text-allow-overlap': true
            },
            paint: {
                'text-color': '#111111',
                'text-halo-color': '#ffffff',
                'text-halo-width': 1.5
            }
        });
        // Ensure annotation layers are on top of Draw's layers so selected colors show; circles on top
        ['annotations-fill', 'annotations-line', 'annotations-linestring', 'annotations-point', 'user-circles-fill', 'user-circles-line', 'map-text-layer'].forEach(id => {
            if (map.getLayer(id)) map.moveLayer(id);
        });
    });

    function getSelectedLabel() {
        const input = document.getElementById('label-' + selectedColorIndex);
        return input ? input.value.trim() : '';
    }

    function syncAnnotations() {
        const source = map.getSource('annotations');
        if (!source) return;
        source.setData({ type: 'FeatureCollection', features: draw.getAll() });
    }

    function setActiveDrawButton(mode) {
        document.querySelectorAll('.draw-tool-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.drawMode === mode);
        });
    }

    function setTextMode(active) {
        textModeActive = active;
        const btn = document.getElementById('text-mode-btn');
        if (btn) btn.textContent = translations[currentLang].addText;
        map.getCanvas().style.cursor = active ? 'text' : '';
    }

    function refreshMapTextSource() {
        const src = map.getSource('map-text');
        if (src) src.setData(mapTextData);
    }

    function setFeatureCollectionFeatures(targetCollection, sourceCollection) {
        targetCollection.features.length = 0;
        const sourceFeatures = sourceCollection && Array.isArray(sourceCollection.features) ? sourceCollection.features : [];
        sourceFeatures.forEach(feature => targetCollection.features.push(feature));
    }

    function getAnnotationSnapshot() {
        return JSON.parse(JSON.stringify({
            draw: draw.getAll(),
            circles: userCirclesData,
            text: mapTextData,
            nextTextId: nextMapTextId
        }));
    }

    function updateAnnotationHistoryButtons() {
        const undoBtn = document.getElementById('undo-annotation-btn');
        const redoBtn = document.getElementById('redo-annotation-btn');
        const undoRegionsBtn = document.getElementById('undo-regions-btn');
        const redoRegionsBtn = document.getElementById('redo-regions-btn');
        if (undoBtn) undoBtn.disabled = annotationHistoryPast.length <= 1;
        if (redoBtn) redoBtn.disabled = annotationHistoryFuture.length === 0;
        if (undoRegionsBtn) undoRegionsBtn.disabled = annotationHistoryPast.length <= 1;
        if (redoRegionsBtn) redoRegionsBtn.disabled = annotationHistoryFuture.length === 0;
    }

    function pushAnnotationSnapshot() {
        if (applyingAnnotationHistory) return;
        annotationHistoryPast.push(getAnnotationSnapshot());
        if (annotationHistoryPast.length > 100) annotationHistoryPast.shift();
        annotationHistoryFuture.length = 0;
        updateAnnotationHistoryButtons();
    }

    function applyAnnotationSnapshot(snapshot) {
        applyingAnnotationHistory = true;
        draw.deleteAll();
        if (snapshot.draw && Array.isArray(snapshot.draw.features) && snapshot.draw.features.length > 0) {
            draw.add(snapshot.draw);
        }
        setFeatureCollectionFeatures(userCirclesData, snapshot.circles);
        const circlesSource = map.getSource('user-circles');
        if (circlesSource) circlesSource.setData(userCirclesData);
        setFeatureCollectionFeatures(mapTextData, snapshot.text);
        refreshMapTextSource();
        nextMapTextId = snapshot.nextTextId || 1;
        syncAnnotations();
        applyingAnnotationHistory = false;
        updateAnnotationHistoryButtons();
    }

    function undoAnnotation() {
        if (annotationHistoryPast.length <= 1) return;
        const current = annotationHistoryPast.pop();
        annotationHistoryFuture.push(current);
        const previous = annotationHistoryPast[annotationHistoryPast.length - 1];
        applyAnnotationSnapshot(JSON.parse(JSON.stringify(previous)));
    }

    function redoAnnotation() {
        if (annotationHistoryFuture.length === 0) return;
        const next = annotationHistoryFuture.pop();
        annotationHistoryPast.push(JSON.parse(JSON.stringify(next)));
        applyAnnotationSnapshot(JSON.parse(JSON.stringify(next)));
    }

    function updateDrawToolColor() {
        const color = ANNOTATION_COLORS[selectedColorIndex] || '#43159e';
        const style = map.getStyle();
        if (style && Array.isArray(style.layers)) {
            style.layers.forEach(layer => {
                if (!layer.id || layer.id.indexOf('gl-draw') !== 0 || !map.getLayer(layer.id)) return;
                const isActiveLayer = layer.id.indexOf('hot') !== -1;
                if (layer.type === 'line') {
                    map.setPaintProperty(
                        layer.id,
                        'line-color',
                        isActiveLayer ? color : ['coalesce', ['get', 'user_drawColor'], ['get', 'drawColor'], '#3bb2d0']
                    );
                } else if (layer.type === 'fill') {
                    map.setPaintProperty(
                        layer.id,
                        'fill-color',
                        isActiveLayer ? color : ['coalesce', ['get', 'user_drawColor'], ['get', 'drawColor'], '#3bb2d0']
                    );
                } else if (layer.type === 'circle') {
                    map.setPaintProperty(
                        layer.id,
                        'circle-color',
                        isActiveLayer ? color : ['coalesce', ['get', 'user_drawColor'], ['get', 'drawColor'], '#3bb2d0']
                    );
                }
            });
        }
    }

    // Listen for draw events on the map (Mapbox Draw does not expose draw.on)
    map.on('draw.create', (e) => {
        e.features.forEach(f => {
            f.properties.colorIndex = selectedColorIndex;
            f.properties.drawColor = ANNOTATION_COLORS[selectedColorIndex] || '#43159e';
            f.properties.label = getSelectedLabel();
            draw.add(f);
        });
        syncAnnotations();
        pushAnnotationSnapshot();
    });
    map.on('draw.update', (e) => {
        e.features.forEach(f => {
            if (!f.properties) f.properties = {};
            if (!f.properties.drawColor && !f.properties.user_drawColor) {
                const idx = Number.isInteger(f.properties.colorIndex) ? f.properties.colorIndex : selectedColorIndex;
                f.properties.drawColor = ANNOTATION_COLORS[idx] || '#43159e';
            }
            draw.add(f);
        });
        syncAnnotations();
        pushAnnotationSnapshot();
    });
    map.on('draw.delete', () => {
        syncAnnotations();
        pushAnnotationSnapshot();
    });
    map.on('load', updateDrawToolColor);
    map.on('load', () => {
        if (annotationHistoryPast.length === 0) {
            pushAnnotationSnapshot();
        } else {
            updateAnnotationHistoryButtons();
        }
    });

    document.querySelectorAll('.draw-tool-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const mode = btn.dataset.drawMode;
            if (!mode) return;
            draw.changeMode(mode);
            setActiveDrawButton(mode);
        });
    });

    document.querySelectorAll('.color-swatch').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedColorIndex = parseInt(btn.dataset.colorIndex, 10);
            document.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateDrawToolColor();
        });
    });

    // Keep panel swatches in sync with ANNOTATION_COLORS order
    document.querySelectorAll('.color-swatch').forEach(btn => {
        const i = parseInt(btn.dataset.colorIndex, 10);
        if (ANNOTATION_COLORS[i]) btn.style.background = ANNOTATION_COLORS[i];
    });

    // ----- Circle tool (geographic circles via Turf; radius in meters, custom color) -----
    const circleRadiusInput = document.getElementById('circle-radius');
    const circleRadiusValue = document.getElementById('circle-radius-value');
    function refreshCircleRadiusLabel() {
        if (circleRadiusValue && circleRadiusInput) {
            circleRadiusValue.textContent = circleRadiusInput.value + ' m';
        }
    }
    circleRadiusInput.addEventListener('input', refreshCircleRadiusLabel);
    refreshCircleRadiusLabel();

    function setCircleMode(active) {
        circleModeActive = active;
        const t = translations[currentLang];
        const btn = document.getElementById('circle-mode-btn');
        if (active) {
            if (map.loaded()) draw.changeMode('simple_select');
            if (btn) btn.textContent = t.cancelPlace;
            map.getCanvas().style.cursor = 'crosshair';
        } else {
            if (btn) btn.textContent = t.placeCircle;
            map.getCanvas().style.cursor = '';
        }
        updateCircleHintText();
    }

    document.getElementById('circle-mode-btn').addEventListener('click', () => {
        if (!circleModeActive && textModeActive) setTextMode(false);
        setCircleMode(!circleModeActive);
    });

    document.getElementById('clear-circles-btn').addEventListener('click', () => {
        userCirclesData.features.length = 0;
        const src = map.getSource('user-circles');
        if (src) src.setData(userCirclesData);
        pushAnnotationSnapshot();
    });

    document.querySelectorAll('.circle-region-swatch').forEach((btn) => {
        btn.addEventListener('click', () => {
            const hex = btn.getAttribute('data-circle-preset');
            if (!hex) return;
            circleSwatchColor = hex;
            document.querySelectorAll('.circle-region-swatch').forEach((b) => b.classList.remove('selected'));
            btn.classList.add('selected');
        });
    });
    const firstRegionSwatch = document.querySelector('.circle-region-swatch');
    if (firstRegionSwatch) firstRegionSwatch.classList.add('selected');

    map.on('click', (e) => {
        if (!circleModeActive) return;
        if (typeof turf === 'undefined') return;
        if (!map.getSource('user-circles')) return;
        const radiusM = parseInt(document.getElementById('circle-radius').value, 10);
        const color = circleSwatchColor;
        const circle = turf.circle([e.lngLat.lng, e.lngLat.lat], radiusM, { steps: 64, units: 'meters' });
        if (!circle.properties) circle.properties = {};
        circle.properties.color = color;
        userCirclesData.features.push(circle);
        map.getSource('user-circles').setData(userCirclesData);
        pushAnnotationSnapshot();
    });

    document.getElementById('text-mode-btn').addEventListener('click', () => {
        if (!textModeActive && circleModeActive) setCircleMode(false);
        setTextMode(!textModeActive);
    });

    map.on('mouseenter', 'map-text-layer', () => {
        if (draggingTextId === null && !textModeActive) map.getCanvas().style.cursor = 'move';
    });
    map.on('mouseleave', 'map-text-layer', () => {
        if (draggingTextId === null && !textModeActive) map.getCanvas().style.cursor = '';
    });
    map.on('mousedown', 'map-text-layer', (e) => {
        const feature = e.features && e.features[0];
        if (!feature || !feature.properties) return;
        const id = Number(feature.properties.textId);
        if (!Number.isFinite(id)) return;
        draggingTextId = id;
        suppressNextTextClick = true;
        map.dragPan.disable();
        map.getCanvas().style.cursor = 'grabbing';
    });
    map.on('mousemove', (e) => {
        if (draggingTextId === null) return;
        const target = mapTextData.features.find(f => f.properties && Number(f.properties.textId) === draggingTextId);
        if (!target) return;
        target.geometry.coordinates = [e.lngLat.lng, e.lngLat.lat];
        refreshMapTextSource();
    });
    map.on('mouseup', () => {
        if (draggingTextId === null) return;
        draggingTextId = null;
        map.dragPan.enable();
        map.getCanvas().style.cursor = textModeActive ? 'text' : '';
        pushAnnotationSnapshot();
    });

    map.on('click', (e) => {
        if (!textModeActive) return;
        if (suppressNextTextClick) {
            suppressNextTextClick = false;
            return;
        }
        const textValue = (document.getElementById('map-text-input').value || '').trim();
        if (!textValue) return;
        mapTextData.features.push({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [e.lngLat.lng, e.lngLat.lat] },
            properties: { text: textValue, textId: nextMapTextId++ }
        });
        refreshMapTextSource();
        pushAnnotationSnapshot();
    });

    document.getElementById('undo-annotation-btn').addEventListener('click', undoAnnotation);
    document.getElementById('redo-annotation-btn').addEventListener('click', redoAnnotation);
    document.getElementById('undo-regions-btn').addEventListener('click', undoAnnotation);
    document.getElementById('redo-regions-btn').addEventListener('click', redoAnnotation);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && circleModeActive) setCircleMode(false);
    });

    document.querySelectorAll('.profile-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    function getSelectedProfile() {
        return document.querySelector('.profile-btn.active').dataset.profile;
    }

    document.getElementById('save-shapes-png').addEventListener('click', async () => {
        const keepVisibleLayerIds = new Set([
            'annotations-fill',
            'annotations-line',
            'annotations-linestring',
            'annotations-point',
            'user-circles-fill',
            'user-circles-line',
            'map-text-layer',
            'route'
        ]);
        const hiddenLayerIds = [];
        const style = map.getStyle();
        if (!style || !Array.isArray(style.layers)) return;

        const startMarkerEl = routeStartMarker && routeStartMarker.getElement ? routeStartMarker.getElement() : null;
        const endMarkerEl = routeEndMarker && routeEndMarker.getElement ? routeEndMarker.getElement() : null;
        const prevStartDisplay = startMarkerEl ? startMarkerEl.style.display : '';
        const prevEndDisplay = endMarkerEl ? endMarkerEl.style.display : '';

        try {
            style.layers.forEach(layer => {
                const isDrawLayer = layer.id && layer.id.indexOf('gl-draw') === 0;
                if (!keepVisibleLayerIds.has(layer.id) && !isDrawLayer) {
                    const visibility = map.getLayoutProperty(layer.id, 'visibility');
                    if (visibility !== 'none') {
                        map.setLayoutProperty(layer.id, 'visibility', 'none');
                        hiddenLayerIds.push(layer.id);
                    }
                }
            });

            if (startMarkerEl) startMarkerEl.style.display = 'none';
            if (endMarkerEl) endMarkerEl.style.display = 'none';

            await new Promise(resolve => map.once('idle', resolve));

            const pngUrl = map.getCanvas().toDataURL('image/png');
            const link = document.createElement('a');
            link.href = pngUrl;
            link.download = 'map-shapes.png';
            link.click();
        } finally {
            hiddenLayerIds.forEach(id => {
                if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'visible');
            });
            if (startMarkerEl) startMarkerEl.style.display = prevStartDisplay;
            if (endMarkerEl) endMarkerEl.style.display = prevEndDisplay;
        }
    });

    document.getElementById('save-regions-png-btn').addEventListener('click', () => {
        document.getElementById('save-shapes-png').click();
    });

    // ----- Address search suggestions for start & destination (Mapbox Geocoding) -----
    async function searchAddresses(query) {
        const trimmed = (query || '').trim();
        if (!trimmed) return [];
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(trimmed)}.json?access_token=${mapboxgl.accessToken}&limit=6`;
        const res = await fetch(url);
        if (!res.ok) return [];
        const data = await res.json();
        return Array.isArray(data.features) ? data.features : [];
    }

    function setupAddressSearch(inputId, resultsId) {
        const input = document.getElementById(inputId);
        const resultsEl = document.getElementById(resultsId);
        if (!input || !resultsEl) return;
        let debounce = null;

        function showSuggestions(features) {
            resultsEl.innerHTML = '';
            resultsEl.classList.remove('active');

            // If no results, still show a hint so the user sees feedback
            if (!features || features.length === 0) {
                const hint = document.createElement('div');
                hint.className = 'result-item result-item--hint';
                hint.textContent = 'No results found. Try a more specific address.';
                resultsEl.appendChild(hint);
                resultsEl.classList.add('active');
                return;
            }

            features.forEach((f, i) => {
                const item = document.createElement('div');
                item.className = 'result-item' + (i === 0 ? ' selected' : '');
                const name = f.place_name || f.text || '';
                item.innerHTML = `<div class="result-place">${f.text || ''}</div><div class="result-address">${name}</div>`;
                item.dataset.placeName = name;
                item.onclick = () => {
                    input.value = item.dataset.placeName || '';
                    resultsEl.classList.remove('active');
                    resultsEl.innerHTML = '';
                };
                resultsEl.appendChild(item);
            });
            resultsEl.classList.add('active');
        }

        input.addEventListener('input', () => {
            clearTimeout(debounce);
            const q = input.value.trim();
            if (!q) {
                resultsEl.classList.remove('active');
                resultsEl.innerHTML = '';
                return;
            }
            debounce = setTimeout(async () => {
                try {
                    const features = await searchAddresses(q);
                    showSuggestions(features);
                } catch (e) {
                    console.error('Search error', e);
                    showSuggestions([]);
                }
            }, 250);
        });

        input.addEventListener('keydown', (e) => {
            const selected = resultsEl.querySelector('.result-item.selected');
            if (e.key === 'ArrowDown' && selected && selected.nextElementSibling) {
                e.preventDefault();
                selected.classList.remove('selected');
                selected.nextElementSibling.classList.add('selected');
            } else if (e.key === 'ArrowUp' && selected && selected.previousElementSibling) {
                e.preventDefault();
                selected.classList.remove('selected');
                selected.previousElementSibling.classList.add('selected');
            } else if (e.key === 'Enter' && selected) {
                e.preventDefault();
                input.value = selected.dataset.placeName || '';
                resultsEl.classList.remove('active');
                resultsEl.innerHTML = '';
            }
        });
    }

    setupAddressSearch('start', 'start-results');
    setupAddressSearch('end', 'end-results');

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.address-wrap')) {
            const sr = document.getElementById('start-results');
            const er = document.getElementById('end-results');
            if (sr) sr.classList.remove('active');
            if (er) er.classList.remove('active');
        }
    });

    // Geocoding helper – returns [lng, lat] or null if address not found
    async function getCoords(address) {
        const trimmed = (address || '').trim();
        if (!trimmed) return null;
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(trimmed)}.json?access_token=${mapboxgl.accessToken}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.features || data.features.length === 0) return null;
        return data.features[0].center;
    }

    // Route: geocode whatever the user typed (or selected) in each box and visualize the route
    document.getElementById('calc-route').onclick = async () => {
        var startText = (document.getElementById('start').value || '').trim();
        var endText = (document.getElementById('end').value || '').trim();

        if (!startText || !endText) {
            alert('Please type a starting address and a destination address.');
            return;
        }

        var start = await getCoords(startText);
        var end = await getCoords(endText);

        if (!start) {
            alert(currentLang === 'en' ? translations.en.errStart : translations.pt.errStart);
            return;
        }
        if (!end) {
            alert(currentLang === 'en' ? translations.en.errEnd : translations.pt.errEnd);
            return;
        }

        var profile = getSelectedProfile();
        var url = 'https://api.mapbox.com/directions/v5/mapbox/' + profile + '/' +
            start[0] + ',' + start[1] + ';' + end[0] + ',' + end[1] +
            '?geometries=geojson&access_token=' + mapboxgl.accessToken;

        try {
            var response = await fetch(url);
            var data = await response.json();

            if (data.routes && data.routes.length > 0) {
                var route = data.routes[0].geometry;

                removeRouteMarkers();
                if (map.getLayer('route')) map.removeLayer('route');
                if (map.getSource('route')) map.removeSource('route');

                var startMarkerEl = document.createElement('div');
                startMarkerEl.style.width = '12px';
                startMarkerEl.style.height = '12px';
                startMarkerEl.style.borderRadius = '50%';
                startMarkerEl.style.background = '#fff';
                startMarkerEl.style.border = '2px solid #000';
                startMarkerEl.style.boxShadow = '0 1px 3px rgba(0,0,0,0.25)';
                routeStartMarker = new mapboxgl.Marker({ element: startMarkerEl })
                    .setLngLat(start)
                    .addTo(map);

                var endMarkerEl = document.createElement('div');
                endMarkerEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" aria-hidden="true"><path fill="#3d3d3d" stroke="#1a1a1a" stroke-width="0.6" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>';
                routeEndMarker = new mapboxgl.Marker({ element: endMarkerEl, anchor: 'bottom' })
                    .setLngLat(end)
                    .addTo(map);

                map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: route } });
                map.addLayer({
                    id: 'route',
                    type: 'line',
                    source: 'route',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 'line-color': '#3d3d3d', 'line-width': 3, 'line-opacity': 0.55 }
                });

                var bounds = new mapboxgl.LngLatBounds();
                route.coordinates.forEach(function (coord) { bounds.extend(coord); });
                map.fitBounds(bounds, { padding: 50 });
            } else {
                alert(currentLang === 'en' ? translations.en.errNoRoute : translations.pt.errNoRoute);
            }
        } catch (err) {
            console.error('Error fetching route:', err);
            alert('Error fetching route. Please try again.');
        }
    };
</script>
