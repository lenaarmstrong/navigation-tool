    <meta charset="utf-8">

<body>

<div class="app-wrapper">
    <div class="top-bar">
        <h1 id="header-text">Tell Your Navigation Stories on the Map</h1>
        <span id="active-user-badge" class="active-user-badge" hidden></span>
        <button class="lang-btn" id="lang-btn" aria-label="Switch language">EN</button>
    </div>
    
<div class="layout">
    <div style="display:flex;flex-direction:column;gap:12px;flex:0 0 320px;width:320px;flex-shrink:0;padding-right:36px;">
    <div class="panel">
        <div id="panel-route-annotations">
        <h4 id="visualize-route-heading" style="margin-top: 4px; padding-top: 12px;">Visualize A Route</h4>
        <div class="profile-buttons">
            <button type="button" class="profile-btn active" data-profile="driving">Driving</button>
            <button type="button" class="profile-btn" data-profile="walking">Walking</button>
            <button type="button" class="profile-btn" data-profile="cycling">Cycling</button>
        </div>
        <div class="address-wrap">
            <input type="text" id="start" placeholder="Starting Address" autocomplete="off">
            <div class="search-results" id="start-results"></div>
        </div>
        <div class="address-wrap">
            <input type="text" id="end" placeholder="Destination Address" autocomplete="off">
            <div class="search-results" id="end-results"></div>
        </div>
        <button id="calc-route" style="margin-top: 10px;">Visualize Route</button>
        </div>
        </div>

        <div class="panel">
        <div class="annotations-section">
            <h4 id="annotations-heading">Add Annotations</h4>

            <div class="draw-tools-panel" aria-label="Drawing tools" style="display:flex;flex-direction:row;gap:8px;margin-bottom:12px;align-items:flex-start;justify-content:space-between;">
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;">
                    <span id="draw-tool-line-label">Line</span>
                    <button type="button" class="draw-tool-btn active" data-draw-mode="draw_line_string" aria-label="Draw line">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18L10 12L14 14L20 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;">
                    <span id="draw-tool-region-label">Region</span>
                    <button type="button" class="draw-tool-btn" data-draw-mode="draw_polygon" aria-label="Draw polygon">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6L15 4L20 12L14 20L6 16Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;">
                    <span id="draw-tool-circle-label">Circle</span>
                    <button type="button" id="circle-mode-btn" class="draw-tool-btn" aria-label="Draw circle">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="6.5" fill="none" stroke="currentColor" stroke-width="2"></circle></svg>
                    </button>
                    <div id="circle-resize-controls" style="display:none;flex-direction:column;align-items:stretch;gap:4px;width:100%;margin-top:2px;">
                        <label for="circle-resize-range" id="circle-resize-label" style="font-size:11px;color:#666;text-align:center;">Circle radius</label>
                        <input type="range" id="circle-resize-range" min="50" max="3000" step="50" value="250" style="width:100%;">
                        <span id="circle-resize-value" style="font-size:11px;color:#666;text-align:center;">250 m</span>
                    </div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;">
                    <span id="draw-tool-point-label">Point</span>
                    <button type="button" class="draw-tool-btn" data-draw-mode="draw_point" aria-label="Draw point">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"></circle></svg>
                    </button>
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;">
                    <span id="draw-tool-text-label">Text</span>
                    <button type="button" id="text-mode-btn" class="draw-tool-btn" aria-label="Add text">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M8.9 9.2H15.1M12 9.2V15.8" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="annotation-row" style="margin-top: 10px;">
                <button type="button" class="color-swatch selected" data-color-index="0" style="background: #43159e;" aria-label="Color 1"></button>
                <input type="text" class="label-input" id="label-0" placeholder="e.g. Residents">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="1" style="background: #3066BE;" aria-label="Color 2"></button>
                <input type="text" class="label-input" id="label-1" placeholder="e.g. Taxi drivers">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="2" style="background: #335145;" aria-label="Color 3"></button>
                <input type="text" class="label-input" id="label-2" placeholder="e.g. Delivery workers">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="3" style="background: #a64b00;" aria-label="Color 4"></button>
                <input type="text" class="label-input" id="label-3" placeholder="e.g. Tourists">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="4" style="background: #F7B32B;" aria-label="Color 5"></button>
                <input type="text" class="label-input" id="label-4" placeholder="e.g. Bus drivers">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="5" style="background: #ff4d6d ;" aria-label="Color 6"></button>
                <input type="text" class="label-input" id="label-5" placeholder="e.g. Pedestrians">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="6" style="background: #88CCF1;" aria-label="Color 7"></button>
                <input type="text" class="label-input" id="label-6" placeholder="e.g. new category">
            </div>
            <div class="annotation-row style="margin-bottom: 10px;"">
                <button type="button" class="color-swatch" data-color-index="7" style="background: #8CBA80;" aria-label="Color 8"></button>
                <input type="text" class="label-input" id="label-7" placeholder="e.g. new category">
            </div>

        </div>
        <!-- <p id="hint-text" style="font-size: 12px; color: #666;">Use the top-right toolbar to draw annotations.</p> -->
        <div style="border-top: 1px solid #eee; padding-top: 12px;">
            <div style="display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch;">
                <button type="button" id="save-shapes-png" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Save</button>
                <button type="button" id="undo-annotation-btn" class="circle-secondary-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Undo</button>
                <button type="button" id="redo-annotation-btn" class="circle-secondary-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Redo</button>
                <button type="button" id="clear-annotations-btn" class="circle-secondary-btn" style="flex: 1 1 0; min-width: 0; margin-bottom: 0; min-height: 40px; box-sizing: border-box;">Clear</button>
            </div>
        </div>
        </div>

    </div>

    <div class="map-container">
        <div class="map-inner">
            <div id="map"></div>
        </div>
        <div class="map-preview-legend-row">
            <div class="map-snapshot-section" id="map-snapshot-section">
                <div id="map-snapshot-preview-wrap" class="map-snapshot-preview-wrap" style="display: none;">
                    <div class="map-snapshot-preview-square" id="map-snapshot-preview-square">
                        <img id="map-snapshot-preview" class="map-snapshot-preview" alt="">
                    </div>
                    <div class="map-snapshot-actions">
                        <button type="button" id="map-snapshot-save-png-btn" class="map-snapshot-action-btn">Preview</button>
                        <button type="button" id="map-snapshot-download-png-btn" class="map-snapshot-action-btn">Download Image</button>
                        <button type="button" id="map-snapshot-download-json-btn" class="map-snapshot-action-btn">Download Shapes</button>
                    </div>
                </div>
                <div id="creator-saved-annotations-gallery" class="creator-saved-annotations-gallery" aria-label="All saved map previews"></div>
            </div>
            <div id="annotations-label-legend" aria-live="polite">
                <div id="annotations-label-legend-title">Legend</div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-0-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-0-text"></span></div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-1-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-1-text"></span></div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-2-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-2-text"></span></div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-3-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-3-text"></span></div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-4-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-4-text"></span></div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-5-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-5-text"></span></div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-6-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-6-text"></span></div>
                <div style="display:flex;align-items:center;gap:8px;"><span id="label-legend-7-swatch" style="width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;" aria-hidden="true"></span><span id="label-legend-7-text"></span></div>
            </div>
        </div>
    </div>
</div>
</div>

<div id="creator-login-overlay" class="creator-login-overlay">
    <form id="creator-login-form" class="creator-login-form">
        <h2 id="creator-login-title">Digite seu nome</h2>
        <input id="creator-login-name" type="text" maxlength="80" autocomplete="name" placeholder="Seu nome" required>
        <button type="submit" id="creator-login-submit">Continuar</button>
        <p id="creator-login-error" class="creator-login-error" hidden></p>
    </form>
</div>

    let currentLang = localStorage.getItem('coDesignLang') === 'en' ? 'en' : 'pt';
    const USER_NAME_KEY = 'coDesignUserName';
    const API_BASE = (() => {
        const explicit = (typeof window !== 'undefined' && window.__API_BASE__) ? String(window.__API_BASE__).trim() : '';
        if (explicit) return explicit.replace(/\/+$/, '');
        const host = (typeof window !== 'undefined' && window.location && window.location.hostname) ? window.location.hostname : '';
        // Local development default.
        if (!host || host === 'localhost' || host === '127.0.0.1') return 'http://localhost:8787';

        return 'https://YOUR_BACKEND_DOMAIN';

    function applyLanguage(lang) {
        const t = translations[lang];
        document.getElementById('header-text').textContent = t.header;
        var startInput = document.getElementById('start');
        var endInput = document.getElementById('end');
        if (startInput) startInput.placeholder = t.startPlaceholder;
        if (endInput) endInput.placeholder = t.endPlaceholder;
        document.querySelector('.profile-btn[data-profile="driving"]').textContent = t.driving;
        document.querySelector('.profile-btn[data-profile="walking"]').textContent = t.walking;
        document.querySelector('.profile-btn[data-profile="cycling"]').textContent = t.cycling;
        document.getElementById('visualize-route-heading').textContent = t.visualizeRouteHeading;
        document.getElementById('calc-route').textContent = t.visualizeRoute;

    function finalizeActiveTextDraft(saveToMap) {
        if (!activeTextDraft) return;
        const marker = activeTextDraft.marker;
        const textarea = activeTextDraft.textarea;
        const textValue = ((textarea && textarea.value) || '').trim();
        const textSize = Math.max(10, Math.min(40, Number(activeTextDraft.fontSize) || 15));
        if (saveToMap && marker && textValue) {
            const lngLat = marker.getLngLat();
            mapTextData.features.push({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [lngLat.lng, lngLat.lat] },
                properties: {
                    text: textValue,
                    textId: Number.isFinite(activeTextDraft.editingId) ? activeTextDraft.editingId : nextMapTextId++,
                    textSize
                }
            });
            refreshMapTextSource();
            pushAnnotationSnapshot();
        }
        if (activeTextDraft.resizeObserver) activeTextDraft.resizeObserver.disconnect();
        if (marker) marker.remove();
        activeTextDraft = null;
    }

    function createTextDraftAt(lngLat, opts) {
        finalizeActiveTextDraft(false);
        const options = opts || {};
        const wrapper = document.createElement('div');
        wrapper.style.width = '180px';
        wrapper.style.minWidth = '120px';
        wrapper.style.maxWidth = '360px';
        wrapper.style.background = 'rgba(255,255,255,0.98)';
        wrapper.style.border = '1px solid #6A5ACD';
        wrapper.style.borderRadius = '6px';
        wrapper.style.boxShadow = '0 2px 8px rgba(0,0,0,0.18)';
        wrapper.style.padding = '4px';
        wrapper.style.pointerEvents = 'auto';

        const textarea = document.createElement('textarea');
        textarea.rows = 2;
        textarea.placeholder = translations[currentLang].mapTextPlaceholder;
        textarea.value = options.text || '';
        textarea.style.width = '100%';
        textarea.style.minHeight = '48px';
        textarea.style.maxHeight = '220px';
        textarea.style.resize = 'both';
        textarea.style.display = 'block';
        textarea.style.border = '1px solid #ddd';
        textarea.style.borderRadius = '4px';
        textarea.style.padding = '6px 8px';
        textarea.style.boxSizing = 'border-box';
        textarea.style.fontSize = (options.textSize || 15) + 'px';
        textarea.style.lineHeight = '1.3';
        textarea.style.background = '#ffffff';
        textarea.style.outline = 'none';
        wrapper.appendChild(textarea);

        const marker = new mapboxgl.Marker({ element: wrapper, anchor: 'top-left', draggable: true })
            .setLngLat(lngLat)
            .addTo(map);

        const ro = new ResizeObserver((entries) => {
            const boxH = entries[0] && entries[0].contentRect ? entries[0].contentRect.height : 48;
            const fs = Math.max(10, Math.min(40, Math.round((boxH / 48) * 15)));
            textarea.style.fontSize = fs + 'px';
            if (activeTextDraft) activeTextDraft.fontSize = fs;
        });
        ro.observe(textarea);

        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                finalizeActiveTextDraft(true);
            } else if (e.key === 'Escape') {
                e.preventDefault();
                finalizeActiveTextDraft(false);
                setTextMode(false);
            }
        });

        activeTextDraft = {
            marker,
            textarea,
            fontSize: Number(options.textSize) || 15,
            editingId: Number.isFinite(options.editingId) ? options.editingId : null,
            resizeObserver: ro
        };
        setTimeout(() => textarea.focus(), 0);
    }

    function refreshMapTextSource() {
        const src = map.getSource('map-text');

    function setFeatureCollectionFeatures(targetCollection, sourceCollection) {
        targetCollection.features.length = 0;
        const sourceFeatures = sourceCollection && Array.isArray(sourceCollection.features) ? sourceCollection.features : [];
        sourceFeatures.forEach(feature => targetCollection.features.push(feature));
    }

    function getCircleCenterFromFeature(feature) {
        if (!feature || !feature.properties) return null;
        const lng = Number(feature.properties.centerLng);
        const lat = Number(feature.properties.centerLat);
        if (Number.isFinite(lng) && Number.isFinite(lat)) return [lng, lat];
        try {
            if (typeof turf !== 'undefined' && feature.geometry) {
                const centerFeature = turf.centerOfMass(feature);
                const coords = centerFeature && centerFeature.geometry && centerFeature.geometry.coordinates;
                if (Array.isArray(coords) && coords.length >= 2) return [coords[0], coords[1]];
            }
        } catch (e) {
            // ignore and fallback below
        }
        return null;
    }

    function ensureCircleFeatureMetadata(feature) {
        if (!feature) return;
        if (!feature.properties) feature.properties = {};
        if (!Number.isFinite(Number(feature.properties.circleId))) {
            feature.properties.circleId = nextCircleId++;
        } else {
            nextCircleId = Math.max(nextCircleId, Number(feature.properties.circleId) + 1);
        }
        if (!Number.isFinite(Number(feature.properties.radiusM))) {
            feature.properties.radiusM = currentCircleRadiusMeters;
        }
        const center = getCircleCenterFromFeature(feature);
        if (center) {
            feature.properties.centerLng = center[0];
            feature.properties.centerLat = center[1];
        }
    }

    function refreshUserCirclesSource() {
        const source = map.getSource('user-circles');
        if (source) source.setData(userCirclesData);
    }

    function updateCircleResizeUI() {
        const controls = document.getElementById('circle-resize-controls');
        const range = document.getElementById('circle-resize-range');
        const value = document.getElementById('circle-resize-value');
        const activeCircle = userCirclesData.features.find((f) => Number(f.properties && f.properties.circleId) === selectedCircleId);
        if (!controls || !range || !value) return;
        const radius = activeCircle
            ? Math.max(50, Math.min(3000, Number(activeCircle.properties && activeCircle.properties.radiusM) || currentCircleRadiusMeters))
            : currentCircleRadiusMeters;
        range.value = String(radius);
        value.textContent = radius + ' m';
        controls.style.display = (circleModeActive || !!activeCircle) ? 'flex' : 'none';
    }

    function setSelectedCircle(circleId) {
        selectedCircleId = Number.isFinite(Number(circleId)) ? Number(circleId) : null;
        userCirclesData.features.forEach((feature) => {
            if (!feature.properties) feature.properties = {};
            feature.properties.selected = selectedCircleId !== null && Number(feature.properties.circleId) === selectedCircleId;
        });
        refreshUserCirclesSource();
        updateCircleResizeUI();
    }

    function resizeSelectedCircle(radiusM) {
        if (!Number.isFinite(radiusM) || radiusM <= 0 || typeof turf === 'undefined') return;
        const feature = userCirclesData.features.find((f) => Number(f.properties && f.properties.circleId) === selectedCircleId);
        if (!feature) return;
        const center = getCircleCenterFromFeature(feature);
        if (!center) return;
        const rebuilt = turf.circle(center, radiusM, { steps: 64, units: 'meters' });
        feature.geometry = rebuilt.geometry;
        feature.properties.radiusM = radiusM;
        feature.properties.centerLng = center[0];
        feature.properties.centerLat = center[1];
        refreshUserCirclesSource();
        updateCircleResizeUI();
    }

    function getAnnotationSnapshot() {
        const legendLabels = [];
        for (let i = 0; i <= 7; i++) {
            const input = document.getElementById('label-' + i);
            legendLabels.push({
                colorIndex: i,
                color: ANNOTATION_COLORS[i] || '#95a5a6',
                label: (input && typeof input.value === 'string') ? input.value.trim() : ''
            });
        }
        return JSON.parse(JSON.stringify({
            draw: draw.getAll(),
            circles: userCirclesData,
            text: mapTextData,
            nextTextId: nextMapTextId,
            legend: {
                title: (document.getElementById('annotations-label-legend-title')?.textContent || '').trim(),
                items: legendLabels
            },
            userDisplayName: currentUser || ''
        }));
    }

    function updateAnnotationHistoryButtons() {
        const undoBtn = document.getElementById('undo-annotation-btn');
        const redoBtn = document.getElementById('redo-annotation-btn');
        if (undoBtn) undoBtn.disabled = annotationHistoryPast.length <= 1;
        if (redoBtn) redoBtn.disabled = annotationHistoryFuture.length === 0;
    }

    function pushAnnotationSnapshot() {
        if (applyingAnnotationHistory) return;
        annotationHistoryPast.push(getAnnotationSnapshot());
        if (annotationHistoryPast.length > 100) annotationHistoryPast.shift();
        annotationHistoryFuture.length = 0;
        updateAnnotationHistoryButtons();
    }

    function applyAnnotationSnapshot(snapshot) {
        applyingAnnotationHistory = true;
        draw.deleteAll();
        if (snapshot.draw && Array.isArray(snapshot.draw.features) && snapshot.draw.features.length > 0) {
            draw.add(snapshot.draw);
        }
        setFeatureCollectionFeatures(userCirclesData, snapshot.circles);
        userCirclesData.features.forEach((feature) => {
            ensureCircleFeatureMetadata(feature);
            if (feature.properties) feature.properties.selected = false;
        });
        selectedCircleId = null;
        const circlesSource = map.getSource('user-circles');
        if (circlesSource) circlesSource.setData(userCirclesData);
        setFeatureCollectionFeatures(mapTextData, snapshot.text);
        refreshMapTextSource();
        nextMapTextId = snapshot.nextTextId || 1;
        syncAnnotations();
        applyingAnnotationHistory = false;
        updateAnnotationHistoryButtons();
    }

    function undoAnnotation() {
        if (annotationHistoryPast.length <= 1) return;
        const current = annotationHistoryPast.pop();
        annotationHistoryFuture.push(current);
        const previous = annotationHistoryPast[annotationHistoryPast.length - 1];
        applyAnnotationSnapshot(JSON.parse(JSON.stringify(previous)));
    }

    function redoAnnotation() {
        if (annotationHistoryFuture.length === 0) return;
        const next = annotationHistoryFuture.pop();
        annotationHistoryPast.push(JSON.parse(JSON.stringify(next)));
        applyAnnotationSnapshot(JSON.parse(JSON.stringify(next)));
    }

    function updateDrawToolColor() {
        const color = ANNOTATION_COLORS[selectedColorIndex] || '#43159e';
        const style = map.getStyle();
        if (style && Array.isArray(style.layers)) {
            style.layers.forEach(layer => {
                if (!layer.id || layer.id.indexOf('gl-draw') !== 0 || !map.getLayer(layer.id)) return;
                const isActiveLayer = layer.id.indexOf('hot') !== -1;
                if (layer.type === 'line') {
                    map.setPaintProperty(
                        layer.id,
                        'line-color',
                        isActiveLayer ? color : ['coalesce', ['get', 'user_drawColor'], ['get', 'drawColor'], '#3bb2d0']
                    );
                } else if (layer.type === 'fill') {
                    map.setPaintProperty(
                        layer.id,
                        'fill-color',
                        isActiveLayer ? color : ['coalesce', ['get', 'user_drawColor'], ['get', 'drawColor'], '#3bb2d0']
                    );
                } else if (layer.type === 'circle') {
                    map.setPaintProperty(
                        layer.id,
                        'circle-color',
                        isActiveLayer ? color : ['coalesce', ['get', 'user_drawColor'], ['get', 'drawColor'], '#3bb2d0']
                    );
                }
            });
        }
    }

    map.on('draw.update', (e) => {
        e.features.forEach(f => {
            if (!f.properties) f.properties = {};
            if (!f.properties.drawColor && !f.properties.user_drawColor) {
                const idx = Number.isInteger(f.properties.colorIndex) ? f.properties.colorIndex : selectedColorIndex;
                f.properties.drawColor = ANNOTATION_COLORS[idx] || '#43159e';
            }
            draw.add(f);
        });
        syncAnnotations();
        pushAnnotationSnapshot();
    });
    map.on('draw.delete', () => {
        syncAnnotations();
        pushAnnotationSnapshot();

    map.on('load', updateDrawToolColor);

    map.on('click', (e) => {
        if (!circleModeActive) return;
        if (typeof turf === 'undefined') return;
        if (!map.getSource('user-circles')) return;
        const radiusM = currentCircleRadiusMeters;
        const circleId = nextCircleId++;

    function canvasWrapTextLines(ctx, text, maxWidth) {
        const raw = String(text || '').trim();
        if (!raw) return [];
        const words = raw.split(/\s+/);
        const lines = [];
        let line = '';
        words.forEach((w) => {
            const test = line ? `${line} ${w}` : w;
            if (ctx.measureText(test).width <= maxWidth) {
                line = test;
                return;
            }
            if (line) {
                lines.push(line);
                line = '';
            }
            if (ctx.measureText(w).width <= maxWidth) {
                line = w;
                return;
            }
            let partial = '';
            for (let i = 0; i < w.length; i++) {
                const t2 = partial + w[i];
                if (ctx.measureText(t2).width <= maxWidth) {
                    partial = t2;
                } else {
                    if (partial) {
                        lines.push(partial);
                        partial = w[i];
                    } else {
                        lines.push(w[i]);
                    }
                }
            }
            line = partial;
        });
        if (line) lines.push(line);
        return lines;
    }

    function getRouteSourceDataFromMap() {
        const src = map.getSource('route');
        if (!src || src.type !== 'geojson') return null;
        try {
            if (typeof src.serialize === 'function') {
                const s = src.serialize();
                if (s && s.data) return JSON.parse(JSON.stringify(s.data));
            }
        } catch (e) {
            // ignore
        }
        try {
            if (src._data) return JSON.parse(JSON.stringify(src._data));
        } catch (e2) {
            // ignore
        }
        return null;
    }

    function getRouteGeometryFromMap() {
        const data = getRouteSourceDataFromMap();
        if (!data) return null;
        if (data.type === 'Feature' && data.geometry) return JSON.parse(JSON.stringify(data.geometry));
        if (data.type === 'FeatureCollection' && data.features && data.features[0] && data.features[0].geometry) {
            return JSON.parse(JSON.stringify(data.features[0].geometry));
        }
        return null;
    }

    async function getMapAnnotationsScreenshotDataUrl() {
        if (!map || !map.getCanvas) return null;
        if (!map.loaded()) {
            await new Promise((resolve) => map.once('load', resolve));
        }
        async function blobToDataUrl(blob) {
            return new Promise((resolve) => {
                if (!blob) return resolve(null);
                const fr = new FileReader();
                fr.onload = () => resolve(typeof fr.result === 'string' ? fr.result : null);
                fr.onerror = () => resolve(null);
                fr.readAsDataURL(blob);
            });
        }
        async function captureFromCanvas() {
            const canvas = map.getCanvas();
            try {
                const url = canvas.toDataURL('image/png');
                if (url) return url;
            } catch (e) {
                // ignore and continue to blob fallback
            }
            try {
                const blob = await new Promise((resolve) => {
                    if (!canvas.toBlob) return resolve(null);
                    canvas.toBlob((b) => resolve(b), 'image/png');
                });
                const blobUrl = await blobToDataUrl(blob);
                if (blobUrl) return blobUrl;
            } catch (e2) {
                // ignore and continue to clone fallback
            }
            try {
                const w = canvas.width || Math.max(1, canvas.clientWidth || 1);
                const h = canvas.height || Math.max(1, canvas.clientHeight || 1);
                const tmp = document.createElement('canvas');
                tmp.width = w;
                tmp.height = h;
                const ctx = tmp.getContext('2d');
                if (!ctx) return null;
                ctx.drawImage(canvas, 0, 0, w, h);
                return tmp.toDataURL('image/png');
            } catch (e3) {
                return null;
            }
        }
        // Ensure latest map/annotation updates are painted before capture.
        for (let i = 0; i < 5; i++) {
            if (map.triggerRepaint) map.triggerRepaint();
            await Promise.race([
                new Promise((resolve) => map.once('idle', resolve)),
                new Promise((resolve) => setTimeout(resolve, 220))
            ]);
            await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
            const dataUrl = await captureFromCanvas();
            if (dataUrl) return dataUrl;
        }
        return null;
    }

    async function buildMapSnapshotWithLegendDataUrl(mapDataUrl) {
        if (!mapDataUrl) return null;
        const legendRoot = document.getElementById('annotations-label-legend');
        const mapCanvas = map.getCanvas ? map.getCanvas() : null;
        if (!legendRoot || !mapCanvas) return mapDataUrl;

        const legendRows = [];
        for (let i = 0; i <= 7; i++) {
            const sw = document.getElementById('label-legend-' + i + '-swatch');
            const tx = document.getElementById('label-legend-' + i + '-text');
            if (!sw || !tx) continue;
            const label = (tx.textContent || '').trim();
            if (!label) continue;
            legendRows.push({
                color: sw.style.background || '#95a5a6',
                text: label
            });
        }

        const legendTitleEl = document.getElementById('annotations-label-legend-title');
        const legendTitle = ((legendTitleEl && legendTitleEl.textContent) || 'Legend').trim();
        const userNameLabel = currentUser ? `${translations[currentLang].mapSavedByPrefix}${currentUser}` : '';
        const t = translations[currentLang] || translations.en;
        const startTrim = ((document.getElementById('start') && document.getElementById('start').value) || '').trim();
        const endTrim = ((document.getElementById('end') && document.getElementById('end').value) || '').trim();

        const mapImage = await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = mapDataUrl;
        });
        if (!mapImage) return mapDataUrl;

        const mapW = mapCanvas.width || mapImage.width || 1024;
        const mapH = mapCanvas.height || mapImage.height || 1024;

        const meas = document.createElement('canvas').getContext('2d');
        if (!meas) return mapDataUrl;
        meas.font = '13px Lato, Arial, sans-serif';
        const addrTextMaxW = Math.max(120, mapW - 24);
        const addrLineH = 17;
        let addressFooterH = 0;
        if (startTrim || endTrim) {
            addressFooterH += 12;
            if (startTrim) {
                addressFooterH += 14 + canvasWrapTextLines(meas, startTrim, addrTextMaxW).length * addrLineH + 6;
            }
            if (endTrim) {
                addressFooterH += 14 + canvasWrapTextLines(meas, endTrim, addrTextMaxW).length * addrLineH;
            }
            addressFooterH += 10;
        }

        const showLegendColumn = legendRows.length > 0 || !!userNameLabel;
        if (!showLegendColumn && !addressFooterH) return mapDataUrl;

        const pad = 20;
        const swatchSize = 16;
        const rowGap = 10;
        const titleGap = 14;
        const legendWidth = 280;
        const titleHeight = 24;
        const userGap = userNameLabel ? 20 : 0;
        const legendSwatchBlock = legendRows.length
            ? titleGap + legendRows.length * (swatchSize + rowGap) - rowGap
            : 0;
        const legendHeight = pad + titleHeight + userGap + legendSwatchBlock + pad;
        const leftColumnH = pad + mapH + addressFooterH + pad;
        const outW = showLegendColumn ? mapW + legendWidth + pad * 2 : mapW + pad * 2;
        const outH = Math.max(leftColumnH, showLegendColumn ? legendHeight : 0);

        const out = document.createElement('canvas');
        out.width = outW;
        out.height = outH;
        const ctx = out.getContext('2d');
        if (!ctx) return mapDataUrl;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, outW, outH);
        ctx.drawImage(mapImage, pad, pad, mapW, mapH);

        if (startTrim || endTrim) {
            let ay = pad + mapH + 12;
            ctx.textBaseline = 'top';
            ctx.fillStyle = '#222222';
            if (startTrim) {
                ctx.font = '700 12px Lato, Arial, sans-serif';
                ctx.fillText(t.exportPngRouteFrom, pad + 12, ay);
                ay += 14;
                ctx.font = '13px Lato, Arial, sans-serif';
                canvasWrapTextLines(ctx, startTrim, addrTextMaxW).forEach((ln) => {
                    ctx.fillText(ln, pad + 12, ay);
                    ay += addrLineH;
                });
                ay += 6;
            }
            if (endTrim) {
                ctx.font = '700 12px Lato, Arial, sans-serif';
                ctx.fillText(t.exportPngRouteTo, pad + 12, ay);
                ay += 14;
                ctx.font = '13px Lato, Arial, sans-serif';
                canvasWrapTextLines(ctx, endTrim, addrTextMaxW).forEach((ln) => {
                    ctx.fillText(ln, pad + 12, ay);
                    ay += addrLineH;
                });
            }
        }

        if (showLegendColumn) {
            const legendX = pad + mapW + pad;
            let y = pad + titleHeight;
            ctx.fillStyle = '#222222';
            ctx.font = '700 20px Lato, Arial, sans-serif';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(legendTitle, legendX, y);
            if (userNameLabel) {
                y += 20;
                ctx.fillStyle = '#555555';
                ctx.font = '600 14px Lato, Arial, sans-serif';
                ctx.fillText(userNameLabel, legendX, y);
            }
            y += legendRows.length ? titleGap : 0;
            ctx.font = '15px Lato, Arial, sans-serif';
            legendRows.forEach((row) => {
                y += swatchSize;
                ctx.fillStyle = row.color || '#95a5a6';
                ctx.fillRect(legendX, y - swatchSize + 1, swatchSize, swatchSize);
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(legendX, y - swatchSize + 1, swatchSize, swatchSize);
                ctx.fillStyle = '#333333';
                ctx.fillText(row.text, legendX + swatchSize + 10, y - 2);
                y += rowGap;
            });
        }

        return out.toDataURL('image/png');
    }

    async function buildGalleryPreviewDataUrl(sourceDataUrl) {
        if (!sourceDataUrl) return null;
        const srcImage = await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = sourceDataUrl;
        });
        if (!srcImage) return null;
        const maxSide = 420;
        const srcW = srcImage.width || 1;
        const srcH = srcImage.height || 1;
        const scale = Math.min(1, maxSide / Math.max(srcW, srcH));
        const w = Math.max(1, Math.round(srcW * scale));
        const h = Math.max(1, Math.round(srcH * scale));
        const out = document.createElement('canvas');
        out.width = w;
        out.height = h;
        const ctx = out.getContext('2d');
        if (!ctx) return sourceDataUrl;
        ctx.drawImage(srcImage, 0, 0, w, h);
        // JPEG thumbnail is much smaller for localStorage/gallery use.
        return out.toDataURL('image/jpeg', 0.82);
    }

    async function apiRequest(path, options) {
        const res = await fetch(`${API_BASE}${path}`, {
            credentials: 'include',
            ...options
        });
        if (!res.ok) {
            let message = `Request failed (${res.status})`;
            try {
                const json = await res.json();
                if (json && json.error) message = json.error;
            } catch (e) {
                // no-op fallback
            }
            throw new Error(message);
        }
        return res.json();
    }

    function toAbsoluteApiUrl(url) {
        if (!url || typeof url !== 'string') return url;
        if (/^https?:\/\//i.test(url)) return url;
        if (url.startsWith('/')) return `${API_BASE}${url}`;
        return url;
    }

    function normalizePreviewEntry(entry) {
        if (!entry || typeof entry !== 'object') return entry;
        return {
            ...entry,
            dataUrl: toAbsoluteApiUrl(entry.dataUrl),
            previewPngUrl: toAbsoluteApiUrl(entry.previewPngUrl)
        };
    }

    function normalizeUserName(value) {
        return String(value || '').trim().toLowerCase();

        return Array.isArray(creatorPreviewGallery) ? creatorPreviewGallery : [];

    async function refreshPreviewGalleryFromApi() {
        if (!currentUser) {
            creatorPreviewGallery = [];
            selectedPreviewGalleryId = null;
            return creatorPreviewGallery;
        }
        const userQuery = currentUser ? `?userName=${encodeURIComponent(currentUser)}` : '';
        const data = await apiRequest(`/api/previews${userQuery}`);
        const normalizedCurrentUser = normalizeUserName(currentUser);
        creatorPreviewGallery = Array.isArray(data.previews)
            ? data.previews
                .filter((item) => normalizeUserName(item && item.userDisplayName) === normalizedCurrentUser)
                .map(normalizePreviewEntry)
            : [];
        return creatorPreviewGallery;
    }

    async function appendPreviewToGallery(previewPngDataUrl, thumbDataUrl, annotationsSnapshot) {
        const title = `Map Preview ${new Date().toLocaleString()}`;

        formData.append('title', title);
        formData.append('userName', currentUser || '');
        formData.append('annotationsJson', JSON.stringify(annotationsSnapshot));
        const previewBlob = await (await fetch(previewPngDataUrl)).blob();
        formData.append('previewPng', previewBlob, 'preview.png');
        if (thumbDataUrl) {
            const thumbBlob = await (await fetch(thumbDataUrl)).blob();
            formData.append('thumbnailPng', thumbBlob, 'preview-thumb.jpg');
        }
        const created = await apiRequest('/api/previews', {
            method: 'POST',
            body: formData
        });
        const normalized = normalizePreviewEntry(created);
        creatorPreviewGallery = [normalized, ...creatorPreviewGallery.filter((item) => item.id !== normalized.id)];
        return created.id || null;

    async function buildLegendSnapshotFromEntry(entry) {
        const sourceUrl = entry && (entry.previewPngUrl || entry.dataUrl || mapSnapshotDataUrl);
        if (!sourceUrl) return null;
        async function toSafeImageUrl(url) {
            if (!url || typeof url !== 'string') return url;
            if (url.startsWith('data:') || url.startsWith('blob:')) return url;
            try {
                const res = await fetch(url, { credentials: 'include' });
                if (!res.ok) return url;
                const blob = await res.blob();
                return await new Promise((resolve) => {
                    const fr = new FileReader();
                    fr.onload = () => resolve(typeof fr.result === 'string' ? fr.result : url);
                    fr.onerror = () => resolve(url);
                    fr.readAsDataURL(blob);
                });
            } catch {
                return url;
            }
        }
        const safeSourceUrl = await toSafeImageUrl(sourceUrl);
        const mapImage = await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = safeSourceUrl;
        });
        if (!mapImage) return safeSourceUrl;

        const legendItemsRaw = (entry && entry.annotations && entry.annotations.legend && Array.isArray(entry.annotations.legend.items))
            ? entry.annotations.legend.items
            : [];
        const legendRows = legendItemsRaw
            .map((item, i) => ({
                color: (item && item.color) || ANNOTATION_COLORS[i] || '#95a5a6',
                text: (item && typeof item.label === 'string') ? item.label.trim() : ''
            }))
            .filter((row) => row.text);
        if (!legendRows.length) return safeSourceUrl;

        const legendTitle = (entry && entry.annotations && entry.annotations.legend && entry.annotations.legend.title)
            ? String(entry.annotations.legend.title).trim()
            : ((document.getElementById('annotations-label-legend-title')?.textContent || 'Legend').trim());
        const authorName = ((entry && entry.userDisplayName) || (entry && entry.annotations && entry.annotations.userDisplayName) || currentUser || '').trim();
        const userNameLabel = authorName ? `${translations[currentLang].mapSavedByPrefix}${authorName}` : '';

        const mapW = mapImage.width || 1024;
        const mapH = mapImage.height || 1024;
        const pad = 20;
        const swatchSize = 16;
        const rowGap = 10;
        const titleGap = 14;
        const userGap = userNameLabel ? 16 : 0;
        const legendWidth = 280;
        const titleHeight = 24;
        const legendHeight = pad + titleHeight + userGap + titleGap + (legendRows.length * (swatchSize + rowGap)) - rowGap + pad;
        const outW = mapW + legendWidth + pad * 2;
        const outH = Math.max(mapH + pad * 2, legendHeight);

        const out = document.createElement('canvas');
        out.width = outW;
        out.height = outH;
        const ctx = out.getContext('2d');
        if (!ctx) return safeSourceUrl;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, outW, outH);
        ctx.drawImage(mapImage, pad, pad, mapW, mapH);

        const legendX = pad + mapW + pad;
        let y = pad + titleHeight;
        ctx.fillStyle = '#222222';
        ctx.font = '700 20px Lato, Arial, sans-serif';
        ctx.fillText(legendTitle || 'Legend', legendX, y);
        if (userNameLabel) {
            y += 20;
            ctx.fillStyle = '#555555';
            ctx.font = '600 14px Lato, Arial, sans-serif';
            ctx.fillText(userNameLabel, legendX, y);
        }
        y += titleGap;
        ctx.font = '15px Lato, Arial, sans-serif';
        legendRows.forEach((row) => {
            y += swatchSize;
            ctx.fillStyle = row.color || '#95a5a6';
            ctx.fillRect(legendX, y - swatchSize + 1, swatchSize, swatchSize);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            ctx.strokeRect(legendX, y - swatchSize + 1, swatchSize, swatchSize);
            ctx.fillStyle = '#333333';
            ctx.fillText(row.text, legendX + swatchSize + 10, y - 2);
            y += rowGap;
        });

        try {
            return out.toDataURL('image/png');
        } catch {
            return safeSourceUrl;
        }
    }

    function renderCreatorAnnotationGallery() {
        const host = document.getElementById('creator-saved-annotations-gallery');
        if (!host) return;
        host.innerHTML = '';
        const list = loadPreviewGallery();
        for (let i = list.length - 1; i >= 0; i--) {
            const item = list[i];
            const tile = document.createElement('div');
            tile.className = 'creator-saved-annotation-tile';
            if (item.id === selectedPreviewGalleryId) tile.classList.add('selected');
            const img = document.createElement('img');
            img.src = item.dataUrl;
            img.alt = '';
            tile.appendChild(img);
            tile.addEventListener('click', () => {
                selectedPreviewGalleryId = item.id;
                syncWrapFromSelected();
                if (item.annotations) {
                    applyAnnotationSnapshot(JSON.parse(JSON.stringify(item.annotations)));
                    pushAnnotationSnapshot();
                }
                renderCreatorAnnotationGallery();
            });
            host.appendChild(tile);
        }
    }

    async function initCreatorPreviewGalleryFromStorage() {
        await refreshPreviewGalleryFromApi();
        const list = loadPreviewGallery();
        if (!list.length) {
            syncWrapFromSelected();
            renderCreatorAnnotationGallery();
            return;
        }
        if (!selectedPreviewGalleryId) selectedPreviewGalleryId = list[list.length - 1].id;
        syncWrapFromSelected();
        renderCreatorAnnotationGallery();
    }

    const EMPTY_ANNOTATION_SNAPSHOT = {
        draw: { type: 'FeatureCollection', features: [] },
        circles: { type: 'FeatureCollection', features: [] },
        text: { type: 'FeatureCollection', features: [] },
        nextTextId: 1
    };

    function clearAllMapAnnotations() {
        finalizeActiveTextDraft(false);
        applyAnnotationSnapshot(JSON.parse(JSON.stringify(EMPTY_ANNOTATION_SNAPSHOT)));
        pushAnnotationSnapshot();
    }

    document.getElementById('clear-annotations-btn').addEventListener('click', clearAllMapAnnotations);

    async function flushMapRenderForExport() {
        finalizeActiveTextDraft(true);
        syncAnnotations();
        refreshMapTextSource();
        if (map && map.triggerRepaint) map.triggerRepaint();
        await Promise.race([
            new Promise((resolve) => map.once('idle', resolve)),
            new Promise((resolve) => setTimeout(resolve, 180))
        ]);
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    async function runSaveMapPreview() {
        if (!currentUser) {
            showLoginOverlay(translations[currentLang].loginError);
            return;
        }
        await flushMapRenderForExport();
        const saveBtn = document.getElementById('save-shapes-png');
        saveBtn.disabled = true;
        try {
            const mapOnlyPngUrl = await getMapAnnotationsScreenshotDataUrl();
            if (!mapOnlyPngUrl) return;
            const galleryPreviewDataUrl = await buildGalleryPreviewDataUrl(mapOnlyPngUrl) || mapOnlyPngUrl;
            const pngUrl = await buildMapSnapshotWithLegendDataUrl(mapOnlyPngUrl) || mapOnlyPngUrl;
            // Update preview first so user always sees immediate feedback.
            mapSnapshotDataUrl = galleryPreviewDataUrl;
            const previewImg = document.getElementById('map-snapshot-preview');
            const previewWrap = document.getElementById('map-snapshot-preview-wrap');
            if (previewImg) previewImg.src = galleryPreviewDataUrl;
            if (previewWrap) previewWrap.style.display = '';
            const annotationsSnapshot = getAnnotationSnapshot();
            annotationsSnapshot.userDisplayName = currentUser;
            annotationsSnapshot.savedAt = new Date().toISOString();
            // Keep gallery/viewer payload lightweight and map-focused for reliability.
            selectedPreviewGalleryId = await appendPreviewToGallery(pngUrl, galleryPreviewDataUrl, annotationsSnapshot);
            if (selectedPreviewGalleryId) syncWrapFromSelected();
            await refreshPreviewGalleryFromApi();
            renderCreatorAnnotationGallery();
        } finally {
            saveBtn.disabled = false;
        }
    }

    document.getElementById('save-shapes-png').addEventListener('click', () => {
        runSaveMapPreview();
    });

    document.getElementById('map-snapshot-save-png-btn').addEventListener('click', () => {
        const entry = getGalleryEntryForShownPreview();
        if (!entry) return;
        (async () => {
            const previewUrl = await buildLegendSnapshotFromEntry(entry);
            if (!previewUrl) return;
            const previewImg = document.getElementById('map-snapshot-preview');
            const previewWrap = document.getElementById('map-snapshot-preview-wrap');
            mapSnapshotDataUrl = previewUrl;
            if (previewImg) previewImg.src = previewUrl;
            if (previewWrap) previewWrap.style.display = '';
        })();
    });

    document.getElementById('map-snapshot-download-png-btn').addEventListener('click', () => {
        const cleanUser = (currentUser || 'user').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 24);
        const filename = `map-annotations-${cleanUser}.png`;
        (async () => {
            const triggerObjectUrlDownload = (href) => {
                const link = document.createElement('a');
                link.href = href;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                link.remove();
            };
            try {
                await flushMapRenderForExport();
                const mapOnlyPngUrl = await getMapAnnotationsScreenshotDataUrl();
                if (!mapOnlyPngUrl) return;
                const pngUrl = (await buildMapSnapshotWithLegendDataUrl(mapOnlyPngUrl)) || mapOnlyPngUrl;
                let blob = null;
                if (pngUrl.startsWith('data:image/')) {
                    blob = await (await fetch(pngUrl)).blob();
                } else {
                    const res = await fetch(pngUrl, { credentials: 'include' });
                    if (!res.ok) return;
                    blob = await res.blob();
                }
                if (!blob) return;
                const objectUrl = URL.createObjectURL(blob);
                triggerObjectUrlDownload(objectUrl);
                URL.revokeObjectURL(objectUrl);
            } catch (error) {
                console.error('Failed to download PNG', error);
            }
        })();
    });

    document.getElementById('map-snapshot-download-json-btn').addEventListener('click', () => {
        finalizeActiveTextDraft(true);
        syncAnnotations();
        refreshMapTextSource();
        const payload = buildLiveMapExportPayload();
        const galleryEntry = getGalleryEntryForShownPreview();
        if (galleryEntry && galleryEntry.id) {
            payload.savedPreviewId = galleryEntry.id;
            payload.savedPreviewTitle = galleryEntry.title || null;
        }
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        const cleanUser = (currentUser || 'user').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 24);
        link.download = `map-annotations-${cleanUser}.json`;
        link.click();
        URL.revokeObjectURL(url);
    });

    document.getElementById('map-snapshot-preview-square').addEventListener('click', () => {
        restoreSelectedGalleryAnnotations();
    });

    if (!map.loaded()) {
        map.once('load', () => {
            initCreatorPreviewGalleryFromStorage().catch(console.error);
        });
    }

    // ----- Address search suggestions for start & destination (Mapbox Geocoding) -----
    async function searchAddresses(query) {
        const trimmed = (query || '').trim();
        if (!trimmed) return [];
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(trimmed)}.json?access_token=${mapboxgl.accessToken}&limit=6&country=br`;
        const res = await fetch(url);
        if (!res.ok) return [];
        const data = await res.json();
        return Array.isArray(data.features) ? data.features : [];
    }

    function setupAddressSearch(inputId, resultsId) {
        const input = document.getElementById(inputId);
        const resultsEl = document.getElementById(resultsId);
        if (!input || !resultsEl) return;
        let debounce = null;

        function showSuggestions(features) {
            resultsEl.innerHTML = '';
            resultsEl.classList.remove('active');

            // If no results, still show a hint so the user sees feedback
            if (!features || features.length === 0) {
                const hint = document.createElement('div');
                hint.className = 'result-item result-item--hint';
                hint.textContent = 'No results found. Try a more specific address.';
                resultsEl.appendChild(hint);
                resultsEl.classList.add('active');
                return;
            }

            features.forEach((f, i) => {
                const item = document.createElement('div');
                item.className = 'result-item' + (i === 0 ? ' selected' : '');
                const name = f.place_name || f.text || '';
                item.innerHTML = `<div class="result-place">${f.text || ''}</div><div class="result-address">${name}</div>`;
                item.dataset.placeName = name;
                item.onclick = () => {
                    input.value = item.dataset.placeName || '';
                    resultsEl.classList.remove('active');
                    resultsEl.innerHTML = '';
                };
                resultsEl.appendChild(item);
            });
            resultsEl.classList.add('active');
        }

        input.addEventListener('input', () => {
            clearTimeout(debounce);
            const q = input.value.trim();
            if (!q) {
                resultsEl.classList.remove('active');
                resultsEl.innerHTML = '';
                return;
            }
            debounce = setTimeout(async () => {
                try {
                    const features = await searchAddresses(q);
                    showSuggestions(features);
                } catch (e) {
                    console.error('Search error', e);
                    showSuggestions([]);
                }
            }, 250);
        });

        input.addEventListener('keydown', (e) => {
            const selected = resultsEl.querySelector('.result-item.selected');
            if (e.key === 'ArrowDown' && selected && selected.nextElementSibling) {
                e.preventDefault();
                selected.classList.remove('selected');
                selected.nextElementSibling.classList.add('selected');
            } else if (e.key === 'ArrowUp' && selected && selected.previousElementSibling) {
                e.preventDefault();
                selected.classList.remove('selected');
                selected.previousElementSibling.classList.add('selected');
            } else if (e.key === 'Enter' && selected) {
                e.preventDefault();
                input.value = selected.dataset.placeName || '';
                resultsEl.classList.remove('active');
                resultsEl.innerHTML = '';
            }
        });
    }

    setupAddressSearch('start', 'start-results');
    setupAddressSearch('end', 'end-results');

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.address-wrap')) {
            const sr = document.getElementById('start-results');
            const er = document.getElementById('end-results');
            if (sr) sr.classList.remove('active');
            if (er) er.classList.remove('active');
        }
    });

    // Geocoding helper – returns [lng, lat] or null if address not found
    async function getCoords(address) {
        const trimmed = (address || '').trim();
        if (!trimmed) return null;
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(trimmed)}.json?access_token=${mapboxgl.accessToken}&country=br`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.features || data.features.length === 0) return null;
        return data.features[0].center;
    }

    // Route: geocode whatever the user typed (or selected) in each box and visualize the route
    async function runRouteVisualization(requireInputs) {
        var startText = (document.getElementById('start').value || '').trim();
        var endText = (document.getElementById('end').value || '').trim();

        if (!startText || !endText) {
            if (!requireInputs) return;
            alert('Please type a starting address and a destination address.');
            return;
        }

        var start = await getCoords(startText);
        var end = await getCoords(endText);

        if (!start) {
            alert(currentLang === 'en' ? translations.en.errStart : translations.pt.errStart);
            return;
        }
        if (!end) {
            alert(currentLang === 'en' ? translations.en.errEnd : translations.pt.errEnd);
            return;
        }

        var profile = getSelectedProfile();
        var url = 'https://api.mapbox.com/directions/v5/mapbox/' + profile + '/' +
            start[0] + ',' + start[1] + ';' + end[0] + ',' + end[1] +
            '?geometries=geojson&access_token=' + mapboxgl.accessToken;

        try {
            var response = await fetch(url);
            var data = await response.json();

            if (data.routes && data.routes.length > 0) {
                var route = data.routes[0].geometry;

                removeRouteMarkers();
                if (map.getLayer('route')) map.removeLayer('route');
                if (map.getSource('route')) map.removeSource('route');

                var startMarkerEl = document.createElement('div');
                startMarkerEl.style.width = '12px';
                startMarkerEl.style.height = '12px';
                startMarkerEl.style.borderRadius = '50%';
                startMarkerEl.style.background = '#fff';
                startMarkerEl.style.border = '2px solid #000';
                startMarkerEl.style.boxShadow = '0 1px 3px rgba(0,0,0,0.25)';
                routeStartMarker = new mapboxgl.Marker({ element: startMarkerEl })
                    .setLngLat(start)
                    .addTo(map);

                var endMarkerEl = document.createElement('div');
                endMarkerEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" aria-hidden="true"><path fill="#3d3d3d" stroke="#1a1a1a" stroke-width="0.6" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>';
                routeEndMarker = new mapboxgl.Marker({ element: endMarkerEl, anchor: 'bottom' })
                    .setLngLat(end)
                    .addTo(map);

                map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: route } });
                map.addLayer({
                    id: 'route',
                    type: 'line',
                    source: 'route',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 'line-color': '#3d3d3d', 'line-width': 3, 'line-opacity': 0.55 }
                });

                var bounds = new mapboxgl.LngLatBounds();
                route.coordinates.forEach(function (coord) { bounds.extend(coord); });
                map.fitBounds(bounds, { padding: 50 });
            } else {
                alert(currentLang === 'en' ? translations.en.errNoRoute : translations.pt.errNoRoute);
            }
        } catch (err) {
            console.error('Error fetching route:', err);
            alert('Error fetching route. Please try again.');
        }
    }

    document.getElementById('calc-route').onclick = async () => {
        runRouteVisualization(true);
    };
</script>
