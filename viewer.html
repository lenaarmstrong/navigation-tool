<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .visualization-slot {
            margin-top: 8px;
            width: 100%;
            min-height: 280px;
            background: #d9d9d9;
            border: 1px solid #c3c3c3;
            border-radius: 8px;
        }

        .visualization-heading {
            padding-top: 2rem;
        }

        .participant-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-squares {
            display: inline-flex;
            gap: 6px;
        }

        .mini-square {
            width: 60px;
            height: 60px;
            background: #d9d9d9;
            border: 1px solid #c3c3c3;
            border-radius: 3px;
            margin-top: 24px;
        }

        .mini-square.selected {
            border: 2px solid #6A5ACD;
        }

        .mini-save-btn {
            background: #6A5ACD;
            color: #fff;
            border: 1px solid #6A5ACD;
            border-radius: 6px;
            padding: 6px 10px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 8px;
            width: 100px;
        }

        .saved-previews-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .saved-preview-tile {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #c3c3c3;
            background: #f5f5f5;
            flex-shrink: 0;
            cursor: pointer;
            box-sizing: border-box;
        }

        .saved-preview-tile.selected {
            border-color: #6A5ACD;
            box-shadow: 0 0 0 1px rgba(106, 90, 205, 0.35);
        }

        .saved-preview-tile img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }

        .viewer-preview-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
            align-items: stretch;
        }

        .viewer-preview-toolbar[hidden] {
            display: none !important;
        }

        .viewer-preview-toolbar-btn {
            flex: 1 1 120px;
            margin-bottom: 0;
            padding: 8px;
            box-sizing: border-box;
            background: #ffffff;
            color: #0d6efd;
            border: 2px solid #0d6efd;
            border-radius: 8px;
            font-family: 'Lato', sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }

        .viewer-preview-toolbar-btn:hover {
            background: #0d6efd;
            color: #ffffff;
        }

        .viewer-preview-toolbar-btn.viewer-preview-delete-btn {
            color: #0d6efd;
            border-color: #0d6efd;
        }

        .viewer-preview-toolbar-btn.viewer-preview-delete-btn:hover {
            background: #0d6efd;
            color: #ffffff;
        }

        .viewer-map-container {
            width: 100%;
            height: 380px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #c3c3c3;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }

        .viewer-map-container[hidden] {
            display: none !important;
        }

        #viewer-map {
            width: 100%;
            height: 100%;
        }

        .saved-previews-empty {
            color: #666;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .viewer-saved-preview-hint {
            color: #666;
            font-size: 0.9rem;
            margin: 0 0 10px 0;
            line-height: 1.35;
            width: 100%;
            flex-basis: 100%;
        }

        .saved-previews-gallery .viewer-saved-preview-hint {
            margin-top: 0;
        }

        .viewer-user-group-title {
            width: 100%;
            margin: 8px 0 6px 0;
            font-size: 0.95rem;
            font-weight: 700;
            color: #3a3a55;
        }

        .viewer-import-section {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #ddd;
        }

        .viewer-import-hint {
            color: #666;
            font-size: 0.9rem;
            margin: 0 0 10px 0;
            line-height: 1.35;
        }

        .viewer-import-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        .viewer-import-error {
            color: #b00020;
            font-size: 0.9rem;
            margin: 0 0 10px 0;
        }

        .viewer-import-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 12px 14px;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .viewer-import-meta-block {
            flex: 1 1 200px;
            min-width: 0;
            font-size: 0.9rem;
            color: #333;
        }

        .viewer-import-meta-block h3 {
            margin: 0 0 8px 0;
            font-size: 0.95rem;
            font-weight: 700;
            color: #222;
        }

        .viewer-import-address-hint,
        .viewer-import-legend-hint {
            font-size: 0.82rem;
            color: #666;
            margin: 6px 0 0 0;
            line-height: 1.35;
        }

        .viewer-import-legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .viewer-import-legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .viewer-import-map-container {
            width: 100%;
            height: 420px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #c3c3c3;
            box-sizing: border-box;
        }

        .viewer-import-map-container[hidden] {
            display: none !important;
        }

        #viewer-import-map {
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body>
    <nav class="top-nav" aria-label="Page navigation">
        <a href="viewer.html" class="active" id="nav-viewer-link">Viewer</a>
        <a href="creator.html" id="nav-creator-link">Creator</a>
    </nav>

    <div class="top-bar">
        <h1 id="header-text">Tell Your Navigation Stories on the Map</h1>
        <button type="button" class="lang-btn" id="lang-btn" aria-label="Switch language">EN</button>
    </div>

    <main class="viewer-content">

        <h2 class="visualization-heading" id="viewer-saved-previews-heading">Saved Map Previews</h2>
        <div id="saved-previews-gallery" class="saved-previews-gallery" aria-label="Saved map previews from creator"></div>
        <div id="viewer-preview-toolbar" class="viewer-preview-toolbar" hidden>
            <button type="button" id="viewer-save-png-btn" class="viewer-preview-toolbar-btn">Preview</button>
            <button type="button" id="viewer-download-png-btn" class="viewer-preview-toolbar-btn">Download PNG</button>
            <button type="button" id="viewer-save-json-btn" class="viewer-preview-toolbar-btn">Download JSON</button>
            <button type="button" id="viewer-show-map-btn" class="viewer-preview-toolbar-btn">Show on map</button>
            <button type="button" id="viewer-delete-preview-btn" class="viewer-preview-toolbar-btn viewer-preview-delete-btn">Delete</button>
        </div>
        <div id="viewer-map-container" class="viewer-map-container" hidden>
            <div id="viewer-map" role="application" aria-label="Map showing selected preview annotations"></div>
        </div>

        <section class="viewer-import-section" aria-labelledby="viewer-import-heading">
            <h2 class="visualization-heading" id="viewer-import-heading">Import JSON</h2>
            <p class="viewer-import-hint" id="viewer-import-hint"></p>
            <div class="viewer-import-toolbar">
                <button type="button" id="viewer-import-json-btn" class="viewer-preview-toolbar-btn">Import JSON</button>
                <input type="file" id="viewer-import-json-input" accept="application/json,.json" hidden>
            </div>
            <p class="viewer-import-error" id="viewer-import-json-error" hidden></p>
            <div id="viewer-import-meta" class="viewer-import-meta" hidden></div>
            <div id="viewer-import-map-container" class="viewer-import-map-container" hidden>
                <div id="viewer-import-map" role="application" aria-label="Imported map from JSON file"></div>
            </div>
        </section>

    </main>

    <script src="config.js"></script>
    <script>

        let viewerLang = localStorage.getItem('coDesignLang') === 'en' ? 'en' : 'pt';

        const viewerTranslations = {

            },

                navViewer: 'Visualizador',
                navCreator: 'Criador',
                langBtnAria: 'Alternar idioma',
                header: 'Compartilhe suas histórias de navegação no mapa',
                savedPreviewsHeading: 'Mapas salvas',
                galleryAria: 'Pré-visualizações do mapa salvas no Criador',
                mapAria: 'Mapa com anotações das pré-visualizações selecionadas',
                savePng: 'Visualização',
                downloadPng: 'Baixar PNG',
                saveJson: 'Baixar JSON',
                showMap: 'Mostrar no mapa',
                delete: 'Excluir',

                tileAriaLabel: 'Pré-visualização do mapa',

                mapSavedByPrefix: 'Por: ',
                exportPngRouteFrom: 'Endereço de partida:',
                exportPngRouteTo: 'Endereço de destino:',
                importSectionTitle: 'Importar JSON',
                importHint: 'Escolha um arquivo JSON exportado do mapa para mostrar anotações, rota, endereços, legenda e autor no mapa abaixo.',
                importJsonBtn: 'Importar JSON',
                importMapAria: 'Mapa importado de arquivo JSON',
                importErrorParse: 'Não foi possível ler o arquivo como JSON.',
                importErrorInvalid: 'O arquivo não parece um export válido do mapa (faltam desenho, círculos, texto ou rota).',
                importMetaAuthor: 'Autor',
                importMetaAddresses: 'Endereços',
                importMetaLegend: 'Legenda',
                importMetaNone: '—',
                importLegendEmptySlot: '(Sem rótulo no arquivo)',
                importAddressesMissingHint: 'Partida e destino só aparecem se estavam preenchidos na exportação. Arquivos antigos podem omitir; salve de novo no Criador ou exporte o JSON novamente.',
                importLegendMissingHint: 'As cores da legenda aparecem abaixo; espaços vazios indicam que não havia texto digitado para aquela cor no momento da exportação.'
            }
        };

        function applyViewerLanguage() {
            const t = viewerTranslations[viewerLang];
            document.documentElement.lang = viewerLang === 'pt' ? 'pt' : 'en';
            document.title = t.pageTitle;
            const topNav = document.querySelector('.top-nav');
            if (topNav) topNav.setAttribute('aria-label', t.navAria);
            const navViewer = document.getElementById('nav-viewer-link');
            const navCreator = document.getElementById('nav-creator-link');
            if (navViewer) navViewer.textContent = t.navViewer;
            if (navCreator) navCreator.textContent = t.navCreator;
            const headerEl = document.getElementById('header-text');
            if (headerEl) headerEl.textContent = t.header;
            const savedHeading = document.getElementById('viewer-saved-previews-heading');
            if (savedHeading) savedHeading.textContent = t.savedPreviewsHeading;
            const gallery = document.getElementById('saved-previews-gallery');
            if (gallery) gallery.setAttribute('aria-label', t.galleryAria);
            const mapEl = document.getElementById('viewer-map');
            if (mapEl) mapEl.setAttribute('aria-label', t.mapAria);
            const importHeading = document.getElementById('viewer-import-heading');
            if (importHeading) importHeading.textContent = t.importSectionTitle;
            const importHint = document.getElementById('viewer-import-hint');
            if (importHint) importHint.textContent = t.importHint;
            const importBtn = document.getElementById('viewer-import-json-btn');
            if (importBtn) importBtn.textContent = t.importJsonBtn;
            const importMapEl = document.getElementById('viewer-import-map');
            if (importMapEl) importMapEl.setAttribute('aria-label', t.importMapAria);
            const langBtn = document.getElementById('lang-btn');
            if (langBtn) {
                langBtn.textContent = viewerLang === 'en' ? 'EN' : 'PT';
                langBtn.setAttribute('aria-label', t.langBtnAria);
            }
            setViewerToolbarLabels();
        }

        document.getElementById('lang-btn').addEventListener('click', () => {
            viewerLang = viewerLang === 'en' ? 'pt' : 'en';
            localStorage.setItem('coDesignLang', viewerLang);
            applyViewerLanguage();
            renderSavedPreviewsFromCreator();
        });

        mapboxgl.accessToken = 'pk.eyJ1IjoibGVuYWFybXMiLCJhIjoiY205N3V0aGw2MGJnMDJsb2tiNDB1czFzaiJ9.bTzeSaHAUueU3tJHFNXyAA';

        const API_BASE = (() => {
            const explicit = (typeof window !== 'undefined' && window.__API_BASE__) ? String(window.__API_BASE__).trim() : '';
            if (explicit) return explicit.replace(/\/+$/, '');
            const host = (typeof window !== 'undefined' && window.location && window.location.hostname) ? window.location.hostname : '';
            // Local development default.
            if (!host || host === 'localhost' || host === '127.0.0.1') return 'http://localhost:8787';
            // Production default (set your deployed backend URL here).
            return 'https://YOUR_BACKEND_DOMAIN';
        })();
        const USER_NAME_KEY = 'coDesignUserName';
        const ANNOTATION_COLORS = ['#43159e', '#F7B32B', '#ff4d6d', '#3066BE', '#335145', '#a64b00', '#88CCF1', '#8CBA80'];
        const DEFAULT_MAP_STYLE_FOR_EXPORT = 'mapbox://styles/mapbox/light-v11';

        let viewerSelectedPreviewIds = new Set();
        let viewerMap = null;
        let viewerMapLayersReady = false;
        let viewerMapContainerShown = false;
        const viewerMapInitCallbacks = [];
        let viewerPreviewGallery = [];

        let importMap = null;
        let importMapLayersReady = false;
        const importRouteMarkers = [];
        const IMPORT_ROUTE_SOURCE = 'import-route';
        const IMPORT_ROUTE_LAYER = 'import-route-line';

        async function apiRequest(path, options) {
            const res = await fetch(`${API_BASE}${path}`, {
                credentials: 'include',
                ...options
            });
            if (!res.ok) {
                let message = `Request failed (${res.status})`;
                try {
                    const json = await res.json();
                    if (json && json.error) message = json.error;
                } catch (e) {
                    // fallback
                }
                throw new Error(message);
            }
            return res.json();
        }

        function toAbsoluteApiUrl(url) {
            if (!url || typeof url !== 'string') return url;
            if (/^https?:\/\//i.test(url)) return url;
            if (url.startsWith('/')) return `${API_BASE}${url}`;
            return url;
        }

        function normalizePreviewEntry(entry) {
            if (!entry || typeof entry !== 'object') return entry;
            return {
                ...entry,
                dataUrl: toAbsoluteApiUrl(entry.dataUrl),
                previewPngUrl: toAbsoluteApiUrl(entry.previewPngUrl)
            };
        }

        function loadPreviewGallery() {
            return Array.isArray(viewerPreviewGallery) ? viewerPreviewGallery : [];
        }

        async function refreshViewerGallery() {
            const payload = await apiRequest('/api/previews');
            viewerPreviewGallery = Array.isArray(payload.previews) ? payload.previews.map(normalizePreviewEntry) : [];
            return viewerPreviewGallery;
        }

        function getViewerSelectedEntries() {
            const items = loadPreviewGallery();
            return items.filter((item) => item && item.id && viewerSelectedPreviewIds.has(item.id));
        }

        function updateViewerToolbarVisibility() {
            const toolbar = document.getElementById('viewer-preview-toolbar');
            if (!toolbar) return;
            if (getViewerSelectedEntries().length > 0) {
                toolbar.removeAttribute('hidden');
            } else {
                toolbar.setAttribute('hidden', '');
            }
        }

        function emptyFeatureCollection() {
            return { type: 'FeatureCollection', features: [] };
        }

        function extendBoundsFromGeoJSON(bounds, gj) {
            if (!gj || !Array.isArray(gj.features)) return;
            gj.features.forEach((f) => {
                const g = f.geometry;
                if (!g) return;
                if (g.type === 'Point') bounds.extend(g.coordinates);
                else if (g.type === 'LineString' || g.type === 'MultiPoint') {
                    g.coordinates.forEach((c) => bounds.extend(c));
                } else if (g.type === 'Polygon') {
                    g.coordinates.forEach((ring) => ring.forEach((c) => bounds.extend(c)));
                } else if (g.type === 'MultiPolygon') {
                    g.coordinates.forEach((poly) => poly.forEach((ring) => ring.forEach((c) => bounds.extend(c))));
                } else if (g.type === 'MultiLineString') {
                    g.coordinates.forEach((line) => line.forEach((c) => bounds.extend(c)));
                }
            });
        }

        function extendBoundsFromSnapshot(bounds, snap) {
            if (!snap) return;
            if (snap.draw) extendBoundsFromGeoJSON(bounds, snap.draw);
            if (snap.circles) extendBoundsFromGeoJSON(bounds, snap.circles);
            if (snap.text) extendBoundsFromGeoJSON(bounds, snap.text);
        }

        function extendBoundsFromRouteGeometry(bounds, geometry) {
            if (!geometry || !bounds) return;
            const g = geometry;
            if (g.type === 'LineString' && Array.isArray(g.coordinates)) {
                g.coordinates.forEach((c) => bounds.extend(c));
            } else if (g.type === 'MultiLineString' && Array.isArray(g.coordinates)) {
                g.coordinates.forEach((line) => line.forEach((c) => bounds.extend(c)));
            }
        }

        function colorIndexMatchExpr(palette) {
            const c = palette && palette.length >= 8 ? palette : ANNOTATION_COLORS;
            return ['match', ['get', 'colorIndex'], 0, c[0], 1, c[1], 2, c[2], 3, c[3], 4, c[4], 5, c[5], 6, c[6], 7, c[7], '#95a5a6'];
        }

        function drawColorWithPaletteFallback(palette) {
            return ['coalesce', ['get', 'user_drawColor'], ['get', 'drawColor'], colorIndexMatchExpr(palette)];
        }

        function addAnnotationLayersToMap(map, palette) {
            const strokeColor = drawColorWithPaletteFallback(palette);
            map.addSource('annotations', { type: 'geojson', data: emptyFeatureCollection() });
            map.addLayer({
                id: 'annotations-fill',
                type: 'fill',
                source: 'annotations',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: {
                    'fill-color': strokeColor,
                    'fill-opacity': 0.6
                }
            });
            map.addLayer({
                id: 'annotations-line',
                type: 'line',
                source: 'annotations',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: {
                    'line-color': strokeColor,
                    'line-width': 2
                }
            });
            map.addLayer({
                id: 'annotations-linestring',
                type: 'line',
                source: 'annotations',
                filter: ['==', ['geometry-type'], 'LineString'],
                paint: {
                    'line-color': strokeColor,
                    'line-width': 4
                }
            });
            map.addLayer({
                id: 'annotations-point',
                type: 'circle',
                source: 'annotations',
                filter: ['==', ['geometry-type'], 'Point'],
                paint: {
                    'circle-radius': 8,
                    'circle-color': strokeColor,
                    'circle-stroke-width': 2,
                    'circle-stroke-color': '#fff'
                }
            });
            map.addSource('user-circles', { type: 'geojson', data: emptyFeatureCollection() });
            map.addLayer({
                id: 'user-circles-fill',
                type: 'fill',
                source: 'user-circles',
                paint: {
                    'fill-color': ['coalesce', ['get', 'color'], '#6A5ACD'],
                    'fill-opacity': 0.2
                }
            });
            map.addLayer({
                id: 'user-circles-line',
                type: 'line',
                source: 'user-circles',
                paint: {
                    'line-color': ['coalesce', ['get', 'color'], '#6A5ACD'],
                    'line-width': 1
                }
            });
            map.addSource('map-text', { type: 'geojson', data: emptyFeatureCollection() });
            map.addLayer({
                id: 'map-text-layer',
                type: 'symbol',
                source: 'map-text',
                layout: {
                    'text-field': ['get', 'text'],
                    'text-size': ['coalesce', ['to-number', ['get', 'textSize']], 15],
                    'text-font': ['Lato Regular', 'Arial Unicode MS Regular'],
                    'text-offset': [0, 0],
                    'text-anchor': 'center',
                    'text-allow-overlap': true
                },
                paint: {
                    'text-color': '#111111',
                    'text-halo-color': '#ffffff',
                    'text-halo-width': 1.5
                }
            });
            ['annotations-fill', 'annotations-line', 'annotations-linestring', 'annotations-point', 'user-circles-fill', 'user-circles-line', 'map-text-layer'].forEach((id) => {
                if (map.getLayer(id)) map.moveLayer(id);
            });
        }

        function clearViewerMapSources() {
            if (!viewerMap || !viewerMapLayersReady) return;
            const ann = viewerMap.getSource('annotations');
            const circ = viewerMap.getSource('user-circles');
            const txt = viewerMap.getSource('map-text');
            if (ann) ann.setData(emptyFeatureCollection());
            if (circ) circ.setData(emptyFeatureCollection());
            if (txt) txt.setData(emptyFeatureCollection());
        }

        function mergeAnnotationSnapshots(entries) {
            const drawFeats = [];
            const circleFeats = [];
            const textFeats = [];
            entries.forEach((entry) => {
                const snap = entry && entry.annotations ? entry.annotations : {};
                const d = snap.draw;
                if (d && Array.isArray(d.features)) {
                    d.features.forEach((f) => drawFeats.push(JSON.parse(JSON.stringify(f))));
                }
                const c = snap.circles;
                if (c && Array.isArray(c.features)) {
                    c.features.forEach((f) => circleFeats.push(JSON.parse(JSON.stringify(f))));
                }
                const t = snap.text;
                if (t && Array.isArray(t.features)) {
                    t.features.forEach((f) => textFeats.push(JSON.parse(JSON.stringify(f))));
                }
            });
            return {
                draw: { type: 'FeatureCollection', features: drawFeats },
                circles: { type: 'FeatureCollection', features: circleFeats },
                text: { type: 'FeatureCollection', features: textFeats }
            };
        }

        function canvasWrapTextLines(ctx, text, maxWidth) {
            const raw = String(text || '').trim();
            if (!raw) return [];
            const words = raw.split(/\s+/);
            const lines = [];
            let line = '';
            words.forEach((w) => {
                const test = line ? `${line} ${w}` : w;
                if (ctx.measureText(test).width <= maxWidth) {
                    line = test;
                    return;
                }
                if (line) {
                    lines.push(line);
                    line = '';
                }
                if (ctx.measureText(w).width <= maxWidth) {
                    line = w;
                    return;
                }
                let partial = '';
                for (let i = 0; i < w.length; i++) {
                    const t2 = partial + w[i];
                    if (ctx.measureText(t2).width <= maxWidth) {
                        partial = t2;
                    } else {
                        if (partial) {
                            lines.push(partial);
                            partial = w[i];
                        } else {
                            lines.push(w[i]);
                        }
                    }
                }
                line = partial;
            });
            if (line) lines.push(line);
            return lines;
        }

        async function viewerToSafeImageUrl(url) {
            if (!url || typeof url !== 'string') return url;
            if (url.startsWith('data:') || url.startsWith('blob:')) return url;
            const attempts = [{ mode: 'cors' }, { credentials: 'include', mode: 'cors' }];
            for (let a = 0; a < attempts.length; a++) {
                try {
                    const res = await fetch(url, attempts[a]);
                    if (!res.ok) continue;
                    const blob = await res.blob();
                    const dataUrl = await new Promise((resolve) => {
                        const fr = new FileReader();
                        fr.onload = () => resolve(typeof fr.result === 'string' ? fr.result : url);
                        fr.onerror = () => resolve(url);
                        fr.readAsDataURL(blob);
                    });
                    return dataUrl;
                } catch {
                    /* try next */
                }
            }
            return url;
        }

        function buildViewerJsonExportForEntry(entry) {

            const author = ((entry && entry.userDisplayName) || (a && a.userDisplayName) || '').trim() || null;
            const mapObj = a.map && typeof a.map === 'object'
                ? { style: a.map.style || DEFAULT_MAP_STYLE_FOR_EXPORT, camera: a.map.camera != null ? a.map.camera : null }
                : { style: DEFAULT_MAP_STYLE_FOR_EXPORT, camera: null };
            return {
                schemaVersion: 1,
                exportedAt: new Date().toISOString(),
                map: mapObj,
                route: a.route != null ? a.route : null,
                startAddress: a.startAddress != null ? a.startAddress : null,
                endAddress: a.endAddress != null ? a.endAddress : null,
                author,
                legend: a.legend || null,
                annotationColors: Array.isArray(a.annotationColors) && a.annotationColors.length
                    ? a.annotationColors.slice()
                    : ANNOTATION_COLORS.slice(),
                draw: a.draw,
                circles: a.circles,
                text: a.text,
                nextTextId: a.nextTextId,
                savedPreviewId: (entry && entry.id) || null,
                savedPreviewTitle: (entry && entry.title) || null
            };
        }

        async function buildViewerMapSnapshotExportPngDataUrl(entry, mapDataUrl) {
            if (!mapDataUrl) return null;
            const t = viewerTranslations[viewerLang] || viewerTranslations.en;
            const ann = entry && entry.annotations ? entry.annotations : {};
            const legendItemsRaw = (ann.legend && Array.isArray(ann.legend.items)) ? ann.legend.items : [];
            const legendRows = legendItemsRaw
                .map((item, i) => ({
                    color: (item && item.color) || ANNOTATION_COLORS[i] || '#95a5a6',
                    text: (item && typeof item.label === 'string') ? item.label.trim() : ''
                }))
                .filter((row) => row.text);
            const legendTitle = (ann.legend && ann.legend.title)
                ? String(ann.legend.title).trim()
                : (viewerLang === 'pt' ? 'Legenda' : 'Legend');
            const authorName = ((entry && entry.userDisplayName) || (ann && ann.userDisplayName) || '').trim();
            const userNameLabel = authorName ? `${t.mapSavedByPrefix}${authorName}` : '';
            const startTrim = (typeof ann.startAddress === 'string' ? ann.startAddress : '').trim();
            const endTrim = (typeof ann.endAddress === 'string' ? ann.endAddress : '').trim();

            const mapImage = await new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => resolve(null);
                img.src = mapDataUrl;
            });
            if (!mapImage) return null;

            const mapW = mapImage.naturalWidth || mapImage.width || 1024;
            const mapH = mapImage.naturalHeight || mapImage.height || 1024;

            const meas = document.createElement('canvas').getContext('2d');
            if (!meas) return mapDataUrl;
            meas.font = '13px Lato, Arial, sans-serif';
            const addrTextMaxW = Math.max(120, mapW - 24);
            const addrLineH = 17;
            let addressFooterH = 0;
            if (startTrim || endTrim) {
                addressFooterH += 12;
                if (startTrim) {
                    addressFooterH += 14 + canvasWrapTextLines(meas, startTrim, addrTextMaxW).length * addrLineH + 6;
                }
                if (endTrim) {
                    addressFooterH += 14 + canvasWrapTextLines(meas, endTrim, addrTextMaxW).length * addrLineH;
                }
                addressFooterH += 10;
            }
            const showLegendColumn = legendRows.length > 0 || !!userNameLabel;
            if (!showLegendColumn && !addressFooterH) return mapDataUrl;

            const pad = 20;
            const swatchSize = 16;
            const rowGap = 10;
            const titleGap = 14;
            const legendWidth = 280;
            const titleHeight = 24;
            const userGap = userNameLabel ? 20 : 0;
            const legendSwatchBlock = legendRows.length
                ? titleGap + legendRows.length * (swatchSize + rowGap) - rowGap
                : 0;
            const legendHeight = pad + titleHeight + userGap + legendSwatchBlock + pad;
            const leftColumnH = pad + mapH + addressFooterH + pad;
            const outW = showLegendColumn ? mapW + legendWidth + pad * 2 : mapW + pad * 2;
            const outH = Math.max(leftColumnH, showLegendColumn ? legendHeight : 0);

            const out = document.createElement('canvas');
            out.width = outW;
            out.height = outH;
            const ctx = out.getContext('2d');
            if (!ctx) return mapDataUrl;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, outW, outH);
            ctx.drawImage(mapImage, pad, pad, mapW, mapH);

            if (startTrim || endTrim) {
                let ay = pad + mapH + 12;
                ctx.textBaseline = 'top';
                ctx.fillStyle = '#222222';
                if (startTrim) {
                    ctx.font = '700 12px Lato, Arial, sans-serif';
                    ctx.fillText(t.exportPngRouteFrom, pad + 12, ay);
                    ay += 14;
                    ctx.font = '13px Lato, Arial, sans-serif';
                    canvasWrapTextLines(ctx, startTrim, addrTextMaxW).forEach((ln) => {
                        ctx.fillText(ln, pad + 12, ay);
                        ay += addrLineH;
                    });
                    ay += 6;
                }
                if (endTrim) {
                    ctx.font = '700 12px Lato, Arial, sans-serif';
                    ctx.fillText(t.exportPngRouteTo, pad + 12, ay);
                    ay += 14;
                    ctx.font = '13px Lato, Arial, sans-serif';
                    canvasWrapTextLines(ctx, endTrim, addrTextMaxW).forEach((ln) => {
                        ctx.fillText(ln, pad + 12, ay);
                        ay += addrLineH;
                    });
                }
            }

            if (showLegendColumn) {
                const legendX = pad + mapW + pad;
                let y = pad + titleHeight;
                ctx.fillStyle = '#222222';
                ctx.font = '700 20px Lato, Arial, sans-serif';
                ctx.textBaseline = 'alphabetic';
                ctx.fillText(legendTitle || 'Legend', legendX, y);
                if (userNameLabel) {
                    y += 20;
                    ctx.fillStyle = '#555555';
                    ctx.font = '600 14px Lato, Arial, sans-serif';
                    ctx.fillText(userNameLabel, legendX, y);
                }
                y += legendRows.length ? titleGap : 0;
                ctx.font = '15px Lato, Arial, sans-serif';
                legendRows.forEach((row) => {
                    y += swatchSize;
                    ctx.fillStyle = row.color || '#95a5a6';
                    ctx.fillRect(legendX, y - swatchSize + 1, swatchSize, swatchSize);
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(legendX, y - swatchSize + 1, swatchSize, swatchSize);
                    ctx.fillStyle = '#333333';
                    ctx.fillText(row.text, legendX + swatchSize + 10, y - 2);
                    y += rowGap;
                });
            }

            try {
                return out.toDataURL('image/png');
            } catch {
                return mapDataUrl;
            }
        }

        async function forceDownloadPng(url, filename) {
            const triggerDownload = (href) => {
                const a = document.createElement('a');
                a.href = href;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
            };
            if (typeof url === 'string' && url.startsWith('data:image/')) {
                triggerDownload(url);
                return;
            }
            const attempts = [{ mode: 'cors' }, { credentials: 'include', mode: 'cors' }];
            for (let i = 0; i < attempts.length; i++) {
                try {
                    const response = await fetch(url, attempts[i]);
                    if (!response.ok) continue;
                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);
                    triggerDownload(objectUrl);
                    URL.revokeObjectURL(objectUrl);
                    return;
                } catch {
                    /* try next */
                }
            }
            triggerDownload(url);
        }

        async function downloadViewerEntryPng(entry, indexInBatch, batchSize) {
            const cleanUser = ((entry.userDisplayName || 'user').replace(/[^a-zA-Z0-9_-]/g, '_')).slice(0, 24);
            const idPart = entry.id ? String(entry.id).replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 12) : String(indexInBatch + 1);
            const filename = batchSize > 1
                ? `map-annotations-${cleanUser}-${idPart}.png`
                : `map-annotations-${cleanUser}.png`;

            if (entry.previewPngUrl) {
                await forceDownloadPng(entry.previewPngUrl, filename);
                return;
            }
            const sourceUrl = entry.dataUrl;
            if (!sourceUrl) return;
            const safe = await viewerToSafeImageUrl(sourceUrl);
            const pngUrl = (await buildViewerMapSnapshotExportPngDataUrl(entry, safe)) || safe;
            let blob = null;
            if (pngUrl.startsWith('data:image/')) {
                blob = await (await fetch(pngUrl)).blob();
            } else {
                try {
                    const res = await fetch(pngUrl, { mode: 'cors' });
                    if (res.ok) blob = await res.blob();
                } catch {
                    /* ignore */
                }
            }
            if (!blob) return;
            const objectUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = objectUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(objectUrl);
        }

        function escapeHtmlAttr(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/"/g, '&quot;');
        }

        function normalizeImportPayload(raw) {
            if (!raw || typeof raw !== 'object') return null;
            let base = raw;
            if (Array.isArray(raw.entries) && raw.entries.length > 0) {
                const e = raw.entries[0];
                const ann = (e && e.annotations && typeof e.annotations === 'object') ? e.annotations : {};
                base = {
                    draw: ann.draw,
                    circles: ann.circles,
                    text: ann.text,
                    nextTextId: ann.nextTextId,
                    legend: ann.legend,
                    author: raw.author || ann.author || e.userDisplayName || ann.userDisplayName || null,
                    startAddress: ann.startAddress != null ? ann.startAddress : null,
                    endAddress: ann.endAddress != null ? ann.endAddress : null,
                    map: ann.map || null,
                    route: ann.route != null ? ann.route : null,
                    annotationColors: ann.annotationColors,
                    savedPreviewId: e.id,
                    savedPreviewTitle: e.title
                };
            } else if (!Array.isArray(raw.entries) && raw.annotations && typeof raw.annotations === 'object') {
                const nested = raw.annotations;
                base = { ...raw };
                if (base.startAddress == null && nested.startAddress != null) base.startAddress = nested.startAddress;
                if (base.endAddress == null && nested.endAddress != null) base.endAddress = nested.endAddress;
                if (!base.legend && nested.legend) base.legend = nested.legend;
                if (base.author == null && (nested.author || nested.userDisplayName)) {
                    base.author = nested.author || nested.userDisplayName;
                }
                if (base.route == null && nested.route != null) base.route = nested.route;
                if (!base.map && nested.map) base.map = nested.map;
                if (!base.annotationColors && nested.annotationColors) base.annotationColors = nested.annotationColors;
                if (!base.draw && nested.draw) base.draw = nested.draw;
                if (!base.circles && nested.circles) base.circles = nested.circles;
                if (!base.text && nested.text) base.text = nested.text;
            }
            const hasDraw = base.draw && Array.isArray(base.draw.features) && base.draw.features.length > 0;
            const hasCircles = base.circles && Array.isArray(base.circles.features) && base.circles.features.length > 0;
            const hasText = base.text && Array.isArray(base.text.features) && base.text.features.length > 0;
            const hasRoute = base.route && base.route.geometry;
            if (!hasDraw && !hasCircles && !hasText && !hasRoute) return null;
            return base;
        }

        function renderImportMetaPanel(payload) {
            const meta = document.getElementById('viewer-import-meta');
            if (!meta) return;
            const t = viewerTranslations[viewerLang] || viewerTranslations.en;
            const author = String(payload.author || payload.userDisplayName || '').trim();
            const start = addressFromPayload(payload.startAddress);
            const end = addressFromPayload(payload.endAddress);
            const leg = payload.legend && typeof payload.legend === 'object' ? payload.legend : {};
            const legendTitle = (leg.title && String(leg.title).trim()) || t.importMetaLegend;
            const items = Array.isArray(leg.items) ? leg.items : [];
            const palette = Array.isArray(payload.annotationColors) && payload.annotationColors.length >= 8
                ? payload.annotationColors
                : ANNOTATION_COLORS;
            let legendRows = '';
            if (items.length) {
                items.forEach((item, i) => {
                    const lab = (item && typeof item.label === 'string') ? item.label.trim() : '';
                    const col = (item && item.color) || palette[i] || '#95a5a6';
                    const display = lab || t.importLegendEmptySlot;
                    legendRows += `<div class="viewer-import-legend-row"><span class="viewer-import-legend-swatch" style="background:${escapeHtmlAttr(col)}"></span><span>${escapeHtmlAttr(display)}</span></div>`;
                });
            } else {
                legendRows = `<p>${escapeHtmlAttr(t.importMetaNone)}</p>`;
            }
            legendRows += `<p class="viewer-import-legend-hint">${escapeHtmlAttr(t.importLegendMissingHint)}</p>`;
            let addrBlock = '';
            if (!start && !end) {
                addrBlock = `<p>${escapeHtmlAttr(t.importMetaNone)}</p><p class="viewer-import-address-hint">${escapeHtmlAttr(t.importAddressesMissingHint)}</p>`;
            } else {
                addrBlock = `${start ? `<p><strong>${escapeHtmlAttr(t.exportPngRouteFrom)}</strong> ${escapeHtmlAttr(start)}</p>` : ''}${end ? `<p><strong>${escapeHtmlAttr(t.exportPngRouteTo)}</strong> ${escapeHtmlAttr(end)}</p>` : ''}`;
                if (!start || !end) {
                    addrBlock += `<p class="viewer-import-address-hint">${escapeHtmlAttr(t.importAddressesMissingHint)}</p>`;
                }
            }
            meta.innerHTML = `
                <div class="viewer-import-meta-block"><h3>${escapeHtmlAttr(t.importMetaAuthor)}</h3><p>${author ? escapeHtmlAttr(author) : escapeHtmlAttr(t.importMetaNone)}</p></div>
                <div class="viewer-import-meta-block"><h3>${escapeHtmlAttr(t.importMetaAddresses)}</h3>${addrBlock}</div>
                <div class="viewer-import-meta-block"><h3>${escapeHtmlAttr(legendTitle)}</h3>${legendRows}</div>
            `;
        }

        function applyImportPayloadToImportMap(map, payload) {
            if (!map || !importMapLayersReady || !payload) return;
            const draw = payload.draw && Array.isArray(payload.draw.features) ? payload.draw : emptyFeatureCollection();
            const circles = payload.circles && Array.isArray(payload.circles.features) ? payload.circles : emptyFeatureCollection();
            const text = payload.text && Array.isArray(payload.text.features) ? payload.text : emptyFeatureCollection();
            map.getSource('annotations').setData(draw);
            map.getSource('user-circles').setData(circles);
            map.getSource('map-text').setData(text);

            try {
                if (map.getLayer(IMPORT_ROUTE_LAYER)) map.removeLayer(IMPORT_ROUTE_LAYER);
                if (map.getSource(IMPORT_ROUTE_SOURCE)) map.removeSource(IMPORT_ROUTE_SOURCE);
            } catch (_e) {
                /* ignore */
            }
            importRouteMarkers.forEach((m) => {
                try {
                    m.remove();
                } catch (_e) {
                    /* ignore */
                }
            });
            importRouteMarkers.length = 0;

            if (payload.route && payload.route.geometry) {
                map.addSource(IMPORT_ROUTE_SOURCE, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: payload.route.geometry, properties: {} }
                });
                map.addLayer({
                    id: IMPORT_ROUTE_LAYER,
                    type: 'line',
                    source: IMPORT_ROUTE_SOURCE,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 'line-color': '#3d3d3d', 'line-width': 3, 'line-opacity': 0.55 }
                });
            }

            const r = payload.route;
            if (r && r.startLngLat && Number.isFinite(Number(r.startLngLat.lng)) && Number.isFinite(Number(r.startLngLat.lat))) {
                const el = document.createElement('div');
                el.style.width = '12px';
                el.style.height = '12px';
                el.style.borderRadius = '50%';
                el.style.background = '#fff';
                el.style.border = '2px solid #000';
                el.style.boxShadow = '0 1px 3px rgba(0,0,0,0.25)';
                const m = new mapboxgl.Marker({ element: el })
                    .setLngLat([Number(r.startLngLat.lng), Number(r.startLngLat.lat)])
                    .addTo(map);
                importRouteMarkers.push(m);
            }
            if (r && r.endLngLat && Number.isFinite(Number(r.endLngLat.lng)) && Number.isFinite(Number(r.endLngLat.lat))) {
                const el2 = document.createElement('div');
                el2.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" aria-hidden="true"><path fill="#3d3d3d" stroke="#1a1a1a" stroke-width="0.6" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>';
                const m2 = new mapboxgl.Marker({ element: el2, anchor: 'bottom' })
                    .setLngLat([Number(r.endLngLat.lng), Number(r.endLngLat.lat)])
                    .addTo(map);
                importRouteMarkers.push(m2);
            }

            const layerOrder = [
                'annotations-fill',
                'annotations-line',
                'annotations-linestring',
                'annotations-point',
                IMPORT_ROUTE_LAYER,
                'user-circles-fill',
                'user-circles-line',
                'map-text-layer'
            ];
            layerOrder.forEach((id) => {
                if (map.getLayer(id)) map.moveLayer(id);
            });

            const b = new mapboxgl.LngLatBounds();
            extendBoundsFromSnapshot(b, { draw, circles, text });
            extendBoundsFromRouteGeometry(b, payload.route && payload.route.geometry);
            if (r && r.startLngLat && Number.isFinite(Number(r.startLngLat.lng))) {
                b.extend([Number(r.startLngLat.lng), Number(r.startLngLat.lat)]);
            }
            if (r && r.endLngLat && Number.isFinite(Number(r.endLngLat.lng))) {
                b.extend([Number(r.endLngLat.lng), Number(r.endLngLat.lat)]);
            }

            const cam = payload.map && payload.map.camera;
            if (cam && Array.isArray(cam.center) && cam.center.length === 2 && typeof cam.zoom === 'number') {
                map.jumpTo({
                    center: [Number(cam.center[0]), Number(cam.center[1])],
                    zoom: Number(cam.zoom),
                    bearing: typeof cam.bearing === 'number' ? cam.bearing : 0,
                    pitch: typeof cam.pitch === 'number' ? cam.pitch : 0
                });
            } else if (!b.isEmpty()) {
                map.fitBounds(b, { padding: 48, maxZoom: 16, duration: 0 });
            } else {
                map.jumpTo({ center: [-43.23, -22.93], zoom: 11 });
            }
            map.resize();
        }

        function ensureImportMapFresh(styleUri, palette, callback) {
            importMap = new mapboxgl.Map({
                container: 'viewer-import-map',
                style: (styleUri && typeof styleUri === 'string') ? styleUri : DEFAULT_MAP_STYLE_FOR_EXPORT,
                center: [-43.23, -22.93],
                zoom: 11
            });
            importMap.once('load', () => {
                addAnnotationLayersToMap(importMap, palette);
                importMapLayersReady = true;
                if (callback) callback();
            });
        }

        async function handleViewerJsonImport(file) {
            const errEl = document.getElementById('viewer-import-json-error');
            const meta = document.getElementById('viewer-import-meta');
            const mapWrap = document.getElementById('viewer-import-map-container');
            const t = viewerTranslations[viewerLang] || viewerTranslations.en;
            if (errEl) {
                errEl.setAttribute('hidden', '');
                errEl.textContent = '';
            }
            let text;
            try {
                text = await file.text();
            } catch {
                if (errEl) {
                    errEl.removeAttribute('hidden');
                    errEl.textContent = t.importErrorParse;
                }
                return;
            }
            let raw;
            try {
                raw = JSON.parse(text);
            } catch {
                if (errEl) {
                    errEl.removeAttribute('hidden');
                    errEl.textContent = t.importErrorParse;
                }
                return;
            }
            const payload = normalizeImportPayload(raw);
            if (!payload) {
                if (errEl) {
                    errEl.removeAttribute('hidden');
                    errEl.textContent = t.importErrorInvalid;
                }
                return;
            }
            const palette = Array.isArray(payload.annotationColors) && payload.annotationColors.length >= 8
                ? payload.annotationColors
                : ANNOTATION_COLORS;
            const styleUri = (payload.map && payload.map.style) ? payload.map.style : DEFAULT_MAP_STYLE_FOR_EXPORT;

            destroyImportMap();

            if (meta) {
                meta.removeAttribute('hidden');
                renderImportMetaPanel(payload);
            }
            if (mapWrap) mapWrap.removeAttribute('hidden');

            ensureImportMapFresh(styleUri, palette, () => {
                applyImportPayloadToImportMap(importMap, payload);
            });
        }

        document.getElementById('viewer-import-json-btn').addEventListener('click', () => {
            const input = document.getElementById('viewer-import-json-input');
            if (input) input.click();
        });
        document.getElementById('viewer-import-json-input').addEventListener('change', (ev) => {
            const input = ev.target;
            const f = input.files && input.files[0];
            input.value = '';
            if (!f) return;
            handleViewerJsonImport(f).catch((e) => console.error(e));
        });

        async function initViewerData() {
            await refreshViewerGallery();
            renderSavedPreviewsFromCreator();
        }

        initViewerData().catch(console.error);
    </script>

</body>
