<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Navigation Technology Co-Design Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css">
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>

<div class="app-wrapper">
    <div class="top-bar">
        <h1 id="header-text">Tell Your Navigation Stories on the Map</h1>
        <button class="lang-btn" id="lang-btn" aria-label="Switch language">EN</button>
    </div>

<div class="layout">
    <div class="panel">
        <div class="profile-buttons">
            <button type="button" class="profile-btn active" data-profile="driving">Driving</button>
            <button type="button" class="profile-btn" data-profile="walking">Walking</button>
            <button type="button" class="profile-btn" data-profile="cycling">Cycling</button>
        </div>
        <div class="address-wrap">
            <input type="text" id="start" placeholder="Starting Address" autocomplete="off">
            <div class="search-results" id="start-results"></div>
        </div>
        <div class="address-wrap">
            <input type="text" id="end" placeholder="Destination Address" autocomplete="off">
            <div class="search-results" id="end-results"></div>
        </div>
        <button id="calc-route">Visualize Route</button>
        <div class="annotations-section">
            <h4 id="annotations-heading">Annotation colors</h4>
            <div class="annotation-row">
                <button type="button" class="color-swatch selected" data-color-index="0" style="background: #43159e;" aria-label="Color 1"></button>
                <input type="text" class="label-input" id="label-0" placeholder="e.g. Residents">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="1" style="background: #F7B32B;" aria-label="Color 2"></button>
                <input type="text" class="label-input" id="label-1" placeholder="e.g. Taxi drivers">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="2" style="background: #335145;" aria-label="Color 3"></button>
                <input type="text" class="label-input" id="label-2" placeholder="e.g. Delivery workers">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="3" style="background: #8CBA80;" aria-label="Color 4"></button>
                <input type="text" class="label-input" id="label-3" placeholder="e.g. Tourists">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="4" style="background: #3066BE;" aria-label="Color 5"></button>
                <input type="text" class="label-input" id="label-4" placeholder="e.g. Bus drivers">
            </div>
            <div class="annotation-row">
                <button type="button" class="color-swatch" data-color-index="5" style="background: #88CCF1;" aria-label="Color 6"></button>
                <input type="text" class="label-input" id="label-5" placeholder="e.g. Pedestrians">
            </div>
        </div>
        <p id="hint-text" style="font-size: 12px; color: #666;">Use the top-right toolbar to draw annotations.</p>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>
</div>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoibGVuYWFybXMiLCJhIjoiY205N3V0aGw2MGJnMDJsb2tiNDB1czFzaiJ9.bTzeSaHAUueU3tJHFNXyAA';

    const translations = {
        en: {
            header: 'Tell Your Navigation Stories on the Map',
            startPlaceholder: 'Starting Address',
            endPlaceholder: 'Destination Address',
            driving: 'Driving',
            walking: 'Walking',
            cycling: 'Cycling',
            visualizeRoute: 'Visualize Route',
            hint: 'Use the top-right toolbar to draw annotations.',
            errStart: 'Could not find the starting address. Please check it and try again.',
            errEnd: 'Could not find the destination address. Please check it and try again.',
            errNoRoute: 'No route found between these two addresses. Try a different travel mode or addresses.',
            annotationsHeading: 'Annotation colors',
            routeHint: 'Search, select a result in each box (click or Enter), then click Visualize Route.',
            labelPlaceholder0: 'e.g. Residents',
            labelPlaceholder1: 'e.g. Taxi drivers',
            labelPlaceholder2: 'e.g. Delivery workers',
            labelPlaceholder3: 'e.g. Tourists',
            labelPlaceholder4: 'e.g. Bus drivers',
            labelPlaceholder5: 'e.g. Pedestrians'
        },
        pt: {
            header: 'Compartilhe suas histórias de navegação no mapa',
            startPlaceholder: 'Endereço de partida',
            endPlaceholder: 'Endereço de destino',
            driving: 'Dirigir',
            walking: 'Caminhar',
            cycling: 'Andar de bicicleta',
            visualizeRoute: 'Visualizar Rota',
            hint: 'Use a barra de ferramentas no canto superior direito para desenhar anotações.',
            errStart: 'Não foi possível encontrar o endereço de partida. Verifique e tente novamente.',
            errEnd: 'Não foi possível encontrar o endereço de destino. Verifique e tente novamente.',
            errNoRoute: 'Nenhuma rota encontrada entre esses endereços. Tente outro modo de viagem ou endereços.',
            annotationsHeading: 'Cores das anotações',
            routeHint: 'Pesquise, selecione um resultado em cada caixa (clique ou Enter), depois clique em Visualizar Rota.',
            labelPlaceholder0: 'ex: Residentes',
            labelPlaceholder1: 'ex: Motoristas de táxi',
            labelPlaceholder2: 'ex: Entregadores',
            labelPlaceholder3: 'ex: Turistas',
            labelPlaceholder4: 'ex: Motoristas de ônibus',
            labelPlaceholder5: 'ex: Pedestres'
        }
    };

    let currentLang = 'en';

    function applyLanguage(lang) {
        const t = translations[lang];
        document.getElementById('header-text').textContent = t.header;
        var startInput = document.getElementById('start');
        var endInput = document.getElementById('end');
        if (startInput) startInput.placeholder = t.startPlaceholder;
        if (endInput) endInput.placeholder = t.endPlaceholder;
        document.querySelector('.profile-btn[data-profile="driving"]').textContent = t.driving;
        document.querySelector('.profile-btn[data-profile="walking"]').textContent = t.walking;
        document.querySelector('.profile-btn[data-profile="cycling"]').textContent = t.cycling;
        document.getElementById('calc-route').textContent = t.visualizeRoute;
        document.getElementById('hint-text').textContent = t.hint;
        document.getElementById('annotations-heading').textContent = t.annotationsHeading;
        [0, 1, 2, 3, 4, 5].forEach(i => {
            const input = document.getElementById('label-' + i);
            if (input) input.placeholder = t['labelPlaceholder' + i];
        });
    }

    document.getElementById('lang-btn').onclick = () => {
        currentLang = currentLang === 'en' ? 'pt' : 'en';
        applyLanguage(currentLang);
        document.getElementById('lang-btn').textContent = currentLang === 'en' ? 'EN' : 'PT';
    };

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11',
        center: [-43.23, -22.93], // Rio de Janeiro, Brazil
        zoom: 11
    });

    const ANNOTATION_COLORS = ['#43159e', '#335145', '#F7B32B', '#3066BE', '#8CBA80', '#88CCF1'];
    let selectedColorIndex = 0;

    const draw = new MapboxDraw({
        displayControlsDefault: false,
        controls: { line_string: true, polygon: true, point: true, trash: true },
        userProperties: true
    });
    map.addControl(draw, 'top-right');

    map.on('load', () => {
        map.addSource('annotations', {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: [] }
        });
        map.addLayer({
            id: 'annotations-fill',
            type: 'fill',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'Polygon'],
            paint: {
                'fill-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], '#95a5a6'],
                'fill-opacity': 0.6
            }
        });
        map.addLayer({
            id: 'annotations-line',
            type: 'line',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'Polygon'],
            paint: {
                'line-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], '#95a5a6'],
                'line-width': 2
            }
        });
        map.addLayer({
            id: 'annotations-linestring',
            type: 'line',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'LineString'],
            paint: {
                'line-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], '#95a5a6'],
                'line-width': 4
            }
        });
        map.addLayer({
            id: 'annotations-point',
            type: 'circle',
            source: 'annotations',
            filter: ['==', ['geometry-type'], 'Point'],
            paint: {
                'circle-radius': 8,
                'circle-color': ['match', ['get', 'colorIndex'], 0, ANNOTATION_COLORS[0], 1, ANNOTATION_COLORS[1], 2, ANNOTATION_COLORS[2], 3, ANNOTATION_COLORS[3], 4, ANNOTATION_COLORS[4], 5, ANNOTATION_COLORS[5], '#95a5a6'],
                'circle-stroke-width': 2,
                'circle-stroke-color': '#fff'
            }
        });
        // Ensure annotation layers are on top of Draw's layers so selected colors show
        ['annotations-fill', 'annotations-line', 'annotations-linestring', 'annotations-point'].forEach(id => {
            if (map.getLayer(id)) map.moveLayer(id);
        });
    });

    function getSelectedLabel() {
        const input = document.getElementById('label-' + selectedColorIndex);
        return input ? input.value.trim() : '';
    }

    function syncAnnotations() {
        const source = map.getSource('annotations');
        if (!source) return;
        source.setData({ type: 'FeatureCollection', features: draw.getAll() });
    }

    // Listen for draw events on the map (Mapbox Draw does not expose draw.on)
    map.on('draw.create', (e) => {
        e.features.forEach(f => {
            f.properties.colorIndex = selectedColorIndex;
            f.properties.label = getSelectedLabel();
            draw.add(f);
        });
        syncAnnotations();
    });
    map.on('draw.update', syncAnnotations);
    map.on('draw.delete', syncAnnotations);

    document.querySelectorAll('.color-swatch').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedColorIndex = parseInt(btn.dataset.colorIndex, 10);
            document.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        });
    });

    // Keep panel swatches in sync with ANNOTATION_COLORS order
    document.querySelectorAll('.color-swatch').forEach(btn => {
        const i = parseInt(btn.dataset.colorIndex, 10);
        if (ANNOTATION_COLORS[i]) btn.style.background = ANNOTATION_COLORS[i];
    });

    // (Draw tool colors now use default Mapbox Draw theme)

    document.querySelectorAll('.profile-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    function getSelectedProfile() {
        return document.querySelector('.profile-btn.active').dataset.profile;
    }

    // ----- Address search suggestions for start & destination (Mapbox Geocoding) -----
    async function searchAddresses(query) {
        const trimmed = (query || '').trim();
        if (!trimmed) return [];
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(trimmed)}.json?access_token=${mapboxgl.accessToken}&limit=6`;
        const res = await fetch(url);
        if (!res.ok) return [];
        const data = await res.json();
        return Array.isArray(data.features) ? data.features : [];
    }

    function setupAddressSearch(inputId, resultsId) {
        const input = document.getElementById(inputId);
        const resultsEl = document.getElementById(resultsId);
        if (!input || !resultsEl) return;
        let debounce = null;

        function showSuggestions(features) {
            resultsEl.innerHTML = '';
            resultsEl.classList.remove('active');

            // If no results, still show a hint so the user sees feedback
            if (!features || features.length === 0) {
                const hint = document.createElement('div');
                hint.className = 'result-item result-item--hint';
                hint.textContent = 'No results found. Try a more specific address.';
                resultsEl.appendChild(hint);
                resultsEl.classList.add('active');
                return;
            }

            features.forEach((f, i) => {
                const item = document.createElement('div');
                item.className = 'result-item' + (i === 0 ? ' selected' : '');
                const name = f.place_name || f.text || '';
                item.innerHTML = `<div class="result-place">${f.text || ''}</div><div class="result-address">${name}</div>`;
                item.dataset.placeName = name;
                item.onclick = () => {
                    input.value = item.dataset.placeName || '';
                    resultsEl.classList.remove('active');
                    resultsEl.innerHTML = '';
                };
                resultsEl.appendChild(item);
            });
            resultsEl.classList.add('active');
        }

        input.addEventListener('input', () => {
            clearTimeout(debounce);
            const q = input.value.trim();
            if (!q) {
                resultsEl.classList.remove('active');
                resultsEl.innerHTML = '';
                return;
            }
            debounce = setTimeout(async () => {
                try {
                    const features = await searchAddresses(q);
                    showSuggestions(features);
                } catch (e) {
                    console.error('Search error', e);
                    showSuggestions([]);
                }
            }, 250);
        });

        input.addEventListener('keydown', (e) => {
            const selected = resultsEl.querySelector('.result-item.selected');
            if (e.key === 'ArrowDown' && selected && selected.nextElementSibling) {
                e.preventDefault();
                selected.classList.remove('selected');
                selected.nextElementSibling.classList.add('selected');
            } else if (e.key === 'ArrowUp' && selected && selected.previousElementSibling) {
                e.preventDefault();
                selected.classList.remove('selected');
                selected.previousElementSibling.classList.add('selected');
            } else if (e.key === 'Enter' && selected) {
                e.preventDefault();
                input.value = selected.dataset.placeName || '';
                resultsEl.classList.remove('active');
                resultsEl.innerHTML = '';
            }
        });
    }

    setupAddressSearch('start', 'start-results');
    setupAddressSearch('end', 'end-results');

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.address-wrap')) {
            const sr = document.getElementById('start-results');
            const er = document.getElementById('end-results');
            if (sr) sr.classList.remove('active');
            if (er) er.classList.remove('active');
        }
    });

    // Geocoding helper – returns [lng, lat] or null if address not found
    async function getCoords(address) {
        const trimmed = (address || '').trim();
        if (!trimmed) return null;
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(trimmed)}.json?access_token=${mapboxgl.accessToken}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.features || data.features.length === 0) return null;
        return data.features[0].center;
    }

    // Route: geocode whatever the user typed (or selected) in each box and visualize the route
    document.getElementById('calc-route').onclick = async () => {
        var startText = (document.getElementById('start').value || '').trim();
        var endText = (document.getElementById('end').value || '').trim();

        if (!startText || !endText) {
            alert('Please type a starting address and a destination address.');
            return;
        }

        var start = await getCoords(startText);
        var end = await getCoords(endText);

        if (!start) {
            alert(currentLang === 'en' ? translations.en.errStart : translations.pt.errStart);
            return;
        }
        if (!end) {
            alert(currentLang === 'en' ? translations.en.errEnd : translations.pt.errEnd);
            return;
        }

        var profile = getSelectedProfile();
        var url = 'https://api.mapbox.com/directions/v5/mapbox/' + profile + '/' +
            start[0] + ',' + start[1] + ';' + end[0] + ',' + end[1] +
            '?geometries=geojson&access_token=' + mapboxgl.accessToken;

        try {
            var response = await fetch(url);
            var data = await response.json();

            if (data.routes && data.routes.length > 0) {
                var route = data.routes[0].geometry;

                if (map.getLayer('route')) map.removeLayer('route');
                if (map.getSource('route')) map.removeSource('route');

                map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: route } });
                map.addLayer({
                    id: 'route',
                    type: 'line',
                    source: 'route',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 'line-color': '#0d6efd', 'line-width': 8 }
                });

                var bounds = new mapboxgl.LngLatBounds();
                route.coordinates.forEach(function (coord) { bounds.extend(coord); });
                map.fitBounds(bounds, { padding: 50 });
            } else {
                alert(currentLang === 'en' ? translations.en.errNoRoute : translations.pt.errNoRoute);
            }
        } catch (err) {
            console.error('Error fetching route:', err);
            alert('Error fetching route. Please try again.');
        }
    };
</script>

</body>
</html>
